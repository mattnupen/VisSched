    // ===== EDITOR ACTIONS =====
    function toggleScheduleDropdown(e) {
      e.stopPropagation();
      state.isScheduleDropdownOpen = !state.isScheduleDropdownOpen;
      render();
    }
    function closeScheduleDropdown() { state.isScheduleDropdownOpen = false; render(); }

    function selectSchedule(id) {
      state.currentScheduleId = id;
      state.isScheduleDropdownOpen = false;
      state.openStylePicker = null;
      state.sessionSettings = {};
      saveSchedules();
      render();
    }

    function createSchedule() {
      const newId = uuid();
      state.schedules.push({
        id: newId,
        name: 'New Schedule',
        blocks: JSON.parse(JSON.stringify(INITIAL_BLOCKS)),
        greeting: '',
        lastModified: Date.now(),
        settings: snapshotGlobalScheduleSettings(),
      });
      state.currentScheduleId = newId;
      state.isScheduleDropdownOpen = false;
      state.sessionSettings = {};
      saveSchedules();
      render();
    }

    function createScheduleFromSample(sampleIndex) {
      const sample = SAMPLE_SCHEDULES[sampleIndex];
      if (!sample) return;
      const blocks = sample.blocks.map(b => ({ ...b, description: b.description || '' }));
      const newId = uuid();
      state.schedules.push({
        id: newId,
        name: sample.name,
        blocks,
        greeting: '',
        lastModified: Date.now(),
        settings: snapshotGlobalScheduleSettings(),
      });
      state.currentScheduleId = newId;
      state.isScheduleDropdownOpen = false;
      state.sessionSettings = {};
      saveSchedules();
      render();
    }

    function startBlankSchedule() {
      createSchedule();
    }

    function renderSampleList() {
      const list = document.getElementById('sample-list');
      if (!list) return;
      list.innerHTML = SAMPLE_SCHEDULES.map((s, i) => {
        const totalMin = s.blocks.reduce((a, b) => a + b.durationMinutes, 0);
        return `<button type="button" class="sample-item" onclick="document.getElementById('sample-picker-dialog').close(); createScheduleFromSample(${i});">
          <div class="sample-name">${escHTML(s.name)}</div>
          <div class="sample-summary">${s.blocks.length} blocks · ${totalMin} min</div>
        </button>`;
      }).join('');
    }

    function openNewScheduleDialog() {
      renderSampleList();
      document.getElementById('sample-picker-dialog').showModal();
    }

    function deleteSchedule(id) {
      if (state.schedules.length <= 1) { alert('You must have at least one schedule.'); return; }
      if (!confirm('Are you sure you want to delete this schedule?')) return;
      state.schedules = state.schedules.filter(s => s.id !== id);
      if (state.currentScheduleId === id) state.currentScheduleId = state.schedules[0].id;
      saveSchedules();
      render();
    }

    function startRenaming() {
      state.tempName = getCurrentSchedule().name;
      state.isEditingName = true;
      render();
      setTimeout(() => { const el = document.getElementById('renameInput'); if (el) { el.focus(); el.select(); } }, 50);
    }

    function saveName() {
      if (state.tempName.trim()) {
        updateCurrentSchedule(s => s.name = state.tempName.trim());
      }
      state.isEditingName = false;
      render();
    }

    function addBlock() {
      updateCurrentSchedule(s => {
        s.blocks.push({ id: uuid(), title: '', durationMinutes: 10, color: 'emerald', icon: '⭐', description: '' });
      });
      render();
    }

    function updateBlock(id, field, value) {
      updateCurrentSchedule(s => {
        const b = s.blocks.find(b => b.id === id);
        if (b) b[field] = value;
      });
      // Don't re-render for typing — just save
    }

    function removeBlock(id) {
      updateCurrentSchedule(s => { s.blocks = s.blocks.filter(b => b.id !== id); });
      render();
    }

    function moveBlock(index, dir) {
      const blocks = getBlocks();
      if ((dir === 'up' && index === 0) || (dir === 'down' && index === blocks.length - 1)) return;
      const swap = dir === 'up' ? index - 1 : index + 1;
      updateCurrentSchedule(s => {
        [s.blocks[index], s.blocks[swap]] = [s.blocks[swap], s.blocks[index]];
      });
      render();
    }

    function toggleEmojiPicker(id) {
      state.openEmojiBlockId = state.openEmojiBlockId === id ? null : id;
      render();
    }
    function closeEmojiPicker() { state.openEmojiBlockId = null; render(); }

    function setBlockEmoji(id, emoji) {
      updateBlock(id, 'icon', emoji);
      state.openEmojiBlockId = null;
      render();
    }

    function showChangelog() { state.showChangelog = true; render(); }
    function hideChangelog() { state.showChangelog = false; render(); }

    // ===== FILE I/O =====
    function handleExport() {
      const sched = getCurrentSchedule();
      const data = JSON.stringify(sched.blocks, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `vissched-${sched.name.toLowerCase().replace(/\s+/g, '-')}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function handleFileImport(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (Array.isArray(parsed)) {
            const validated = sanitizeImportedBlocks(parsed);
            if (!validated.length) { alert('Invalid file format.'); return; }
            const newId = uuid();
            state.schedules.push({
              id: newId,
              name: 'Uploaded Schedule',
              blocks: validated,
              lastModified: Date.now(),
              settings: snapshotGlobalScheduleSettings(),
            });
            state.currentScheduleId = newId;
            saveSchedules();
            render();
          } else { alert('Invalid file format.'); }
        } catch(err) { alert('Could not read file.'); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    async function handleShare() {
      try {
        const sched = getCurrentSchedule();
        const eff = getEffectiveSettings();
        // Snapshot only the six visual fields; audio is global.
        const settings = {};
        for (const k of SCHEDULE_SETTING_KEYS) settings[k] = eff[k];
        const payload = {
          v: 2,
          blocks: sched.blocks,
          settings,
        };
        if (sched.name) payload.name = sched.name;
        if (sched.greeting) payload.greeting = sched.greeting;
        if (sched.startTime) payload.startTime = sched.startTime;
        const json = JSON.stringify(payload);
        const encoded = btoa(unescape(encodeURIComponent(json)));
        const url = `${window.location.origin}${window.location.pathname}?s=${encoded}`;
        const shareTitle = sched.name || 'Visual Schedule';
        if (await nativeShare(shareTitle, url)) return;
        navigator.clipboard.writeText(url).then(() => {
          state.linkCopied = true;
          render();
          setTimeout(() => { state.linkCopied = false; render(); }, 2000);
        });
      } catch(e) { alert('Could not create share link.'); }
    }

    // ===== START SCHEDULE =====
    function startSchedule() {
      ensureAudioContextRunning();
      const sched = getCurrentSchedule();
      if (!sched.startTime) {
        state.runStartTime = Date.now();
      } else {
        const now = new Date();
        const [h, m] = sched.startTime.split(':').map(Number);
        const start = new Date(now);
        start.setHours(h, m, 0, 0);
        state.runStartTime = start.getTime();
      }
      state.mode = 'RUN';
      state.isPlaying = true;
      state.showSettings = false;
      state.openStylePicker = null;
      state.isDragging = false;
      state.pauseOffset = 0;
      state.lastPauseStart = 0;
      setNativeStatusBar(false);
      setNativeKeepAwake(true);

      // Sync position from wall clock
      syncPositionFromClock();
      render();
    }

    // ===== TIMER =====
    // The timer is purely wall-clock-anchored. On each tick we compute
    // the absolute elapsed seconds from runStartTime vs Date.now(), then
    // walk the blocks to find the current position. This prevents any
    // drift that accumulates from interval-based counting.

    // When the user drags or pauses, we store an offset so that resuming
    // picks up from the paused position rather than jumping to wall-clock time.
    // state.pauseOffset = total seconds of "paused time" to subtract from wall-clock diff.
    // state.lastPauseStart = Date.now() when pause began (0 if playing).

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (timerRafId) { cancelAnimationFrame(timerRafId); timerRafId = null; }
    }

    // Compute total elapsed seconds since schedule start, accounting for pauses
    function getTotalElapsedSeconds() {
      const now = Date.now();
      if (now < state.runStartTime) return 0;
      let elapsed = (now - state.runStartTime) / 1000;
      elapsed -= (state.pauseOffset || 0);
      // If currently paused, also subtract time since pause started
      if (state.lastPauseStart) {
        elapsed -= (now - state.lastPauseStart) / 1000;
      }
      return Math.max(0, elapsed);
    }

    // Walk blocks to find current block index + seconds within that block
    function syncPositionFromClock() {
      const blocks = getBlocks();
      const totalElapsed = getTotalElapsedSeconds();
      let acc = 0;
      for (let i = 0; i < blocks.length; i++) {
        const bs = blocks[i].durationMinutes * 60;
        if (totalElapsed < acc + bs) {
          state.currentBlockIndex = i;
          state.secondsElapsedInBlock = totalElapsed - acc;
          return;
        }
        acc += bs;
      }
      // Past all blocks — complete
      state.currentBlockIndex = blocks.length;
      state.secondsElapsedInBlock = 0;
      state.isPlaying = false;
    }

    let lastBlockIndex = -1;

    // One tick step, shared by both the rAF loop and the setInterval loop.
    // Returns true if a full re-render was triggered (caller should exit early).
    function doTimerTick() {
      if (!state.isPlaying || state.isDragging) return false;
      syncPositionFromClock();
      if (state.currentBlockIndex !== lastBlockIndex) {
        lastBlockIndex = state.currentBlockIndex;
        state.warningsFiredForBlock.clear(); // fresh warnings for the new block
        nativeHaptic('medium'); // tactile cue on block transition
        if (state.currentBlockIndex >= getBlocks().length) {
          // Embed mode (homepage demo): silently loop the schedule from the top.
          if (state.embedMode) {
            state.runStartTime = Date.now();
            state.pauseOffset = 0;
            state.lastPauseStart = 0;
            state.currentBlockIndex = 0;
            state.secondsElapsedInBlock = 0;
            state.isPlaying = true;
            lastBlockIndex = 0;
            renderTimerFull();
            startTimerTick();
            return true;
          }
          stopTimer();
        }
        renderTimerFull();
        return true;
      }
      updateTimerDisplay();
      return false;
    }

    function startTimerTick() {
      stopTimer();
      lastBlockIndex = state.currentBlockIndex;

      const { viewMode } = getEffectiveSettings();
      const isVisualMode = viewMode && viewMode !== 'schedule';

      if (isVisualMode) {
        // rAF loop: runs at the browser's display refresh rate (typically 60 Hz).
        // Gives smooth motion to the SVG animation modes that compute positions
        // from elapsed time. Background tabs are throttled by the browser — fine
        // since state re-syncs from Date.now() on every frame.
        const rafTick = () => {
          doTimerTick();
          timerRafId = requestAnimationFrame(rafTick);
        };
        timerRafId = requestAnimationFrame(rafTick);
      } else {
        // Schedule-list mode: 100ms is plenty — countdown text updates once per
        // second and no smooth position motion is needed.
        timerInterval = setInterval(doTimerTick, 100);
      }
    }

    function renderTimer() {
      renderTimerFull();
      if (state.isPlaying) startTimerTick();
    }

    function renderTimerFull() {
      const blocks = getBlocks();
      const sched = getCurrentSchedule();
      const s = getEffectiveSettings();
      const isComplete = state.currentBlockIndex >= blocks.length;
      const totalDur = blocks.reduce((a, b) => a + b.durationMinutes, 0);

      // Build CSS variables
      const themeVars = THEME_STYLES[s.theme] || THEME_STYLES.light;
      const sizeVars = TEXT_SIZE_STYLES[s.textSize || 2];
      const cssVars = { ...themeVars, ...sizeVars, '--progress-bar': '#dc2626', '--progress-shadow': 'rgba(220,38,38,0.5)' };
      const styleStr = Object.entries(cssVars).map(([k,v]) => `${k}:${v}`).join(';');

      // Time column values
      let cumTime = state.runStartTime;
      const timeVals = blocks.map(b => { const v = cumTime; cumTime += b.durationMinutes * 60000; return v; });

      // Total time remaining
      let timeRemaining = '';
      if (isComplete) { timeRemaining = '0:00'; }
      else if (Date.now() < state.runStartTime) {
        timeRemaining = `Starts in ${formatTime(Math.ceil((state.runStartTime - Date.now()) / 1000))}`;
      } else {
        const future = blocks.slice(state.currentBlockIndex + 1).reduce((a, b) => a + b.durationMinutes * 60, 0);
        const cur = Math.max(0, blocks[state.currentBlockIndex].durationMinutes * 60 - state.secondsElapsedInBlock);
        timeRemaining = formatTime(future + cur);
      }

      // Visual timer mode?
      const isVisualMode = s.viewMode && s.viewMode !== 'schedule';

      root.innerHTML = `
        <div class="timer-container" style="${styleStr}" id="timerContainer">
          <!-- Header -->
          <div class="timer-header">
            <div class="timer-clock">
              ${iconHTML('clock')} <span>${timeRemaining}</span>
            </div>
            <div class="timer-controls">
              <button class="play-pause-btn ${state.isPlaying ? 'playing' : 'paused'}" onclick="togglePlay()">
                ${state.isPlaying ? iconHTML('pause') + '<span class="timer-ctrl-btn-label">PAUSE</span>' : iconHTML('play') + '<span class="timer-ctrl-btn-label">START</span>'}
              </button>
              <button class="timer-ctrl-btn" onclick="resetTimer()" title="Restart">${iconHTML('rotateCcw')}</button>
              <button class="timer-ctrl-btn" onclick="backToEdit()" title="Edit">${iconHTML('edit3')}</button>
              <button class="timer-ctrl-btn" onclick="openSettings()" title="Settings">${iconHTML('settings')}</button>
              <button class="timer-ctrl-btn" onclick="toggleFullScreen()" title="Fullscreen">
                ${state.isFullScreen ? iconHTML('minimize2') : iconHTML('maximize2')}
              </button>
            </div>
          </div>

          <!-- Greeting -->
          ${s.showGreeting && sched.greeting ? `
            <div class="greeting-banner">
              <h1 class="greeting-text">${escHTML(sched.greeting)}</h1>
            </div>
          ` : ''}

          <!-- Main Area -->
          <div class="timer-scroll" id="timerScroll">
            ${isVisualMode ? renderVisualTimerMode(blocks, s.viewMode) : renderScheduleBlocks(blocks, totalDur, timeVals, s)}
          </div>

          ${state.showSettings ? renderSettingsModal() : ''}
        </div>
      `;

      // Setup drag
      setupDragHandlers();

      // In visual mode, place the needle from real DOM offsets (the template renders
      // it without an inline `top` and with `.dragging` to suppress transitions). Then
      // remove the transition-suppressing class on the next frame so subsequent ticks
      // animate smoothly. Without this, the post-drag re-render would animate the
      // needle from the freshly-laid-out percentage to the JS-set pixel value.
      if (isVisualMode) {
        positionVsNeedle();
        if (!state.isDragging) {
          requestAnimationFrame(() => {
            document.getElementById('vsNeedle')?.classList.remove('dragging');
          });
        }
      }

      // Apply countdown warning color/pulse on first paint after a full re-render,
      // so colors are correct immediately (not waiting for the next tick).
      if (!isComplete && blocks.length) {
        const block = blocks[state.currentBlockIndex];
        if (block) {
          const remaining = block.durationMinutes * 60 - state.secondsElapsedInBlock;
          applyCountdownWarning(remaining);
          // Also tint the schedule-mode countdown badge if present
          const badge = document.getElementById('countdownBadge');
          if (badge) badge.style.color = getCountdownColor(remaining) || '';
        }
      }
    }

    function renderScheduleBlocks(blocks, totalDur, timeVals, s) {
      const isComplete = state.currentBlockIndex >= blocks.length;

      return `
        <div class="timer-blocks-wrapper">
          ${s.showTimeColumn ? `
            <div class="time-column">
              ${blocks.map((b, i) => `
                <div class="time-cell" style="height:${(b.durationMinutes / totalDur) * 100}%;min-height:var(--min-block-height)">
                  <span class="time-cell-text">${formatClockTime(timeVals[i])}</span>
                </div>
              `).join('')}
            </div>
          ` : ''}
          <div class="blocks-container" id="blocksContainer">
            ${blocks.map((block, i) => {
              const isActive = i === state.currentBlockIndex;
              const isPast = i < state.currentBlockIndex;
              const pct = (block.durationMinutes / totalDur) * 100;
              const progress = isActive ? Math.min(100, (state.secondsElapsedInBlock / (block.durationMinutes * 60)) * 100) : 0;
              const countdown = formatTime((block.durationMinutes * 60) - state.secondsElapsedInBlock);

              return `
                <div class="schedule-block ${isPast ? 'past' : isActive ? 'active' : 'future'}"
                     style="height:${pct}%;min-height:var(--min-block-height)"
                     data-block-index="${i}">
                  <div class="block-bg ${isActive ? 'active-bg' : 'normal-bg'}"></div>

                  ${s.progressStyle === 'fill' && isPast ? '<div class="fill-past-overlay"></div>' : ''}

                  ${s.progressStyle === 'fill' && isActive ? `
                    <div class="fill-active-progress" id="fillProgress" style="height:${progress}%;${state.isDragging ? 'pointer-events:none' : ''}">
                      <div class="drag-handle" style="bottom:0;transform:translateY(50%)" onpointerdown="startDrag(event)">
                        <div class="drag-handle-dots green">
                          <div class="drag-dot"></div><div class="drag-dot"></div>
                          <div class="drag-dot"></div><div class="drag-dot"></div>
                        </div>
                      </div>
                    </div>
                  ` : ''}

                  ${isActive && s.progressStyle === 'line' ? `
                    <div class="line-needle ${state.isDragging ? 'dragging' : ''}" id="lineNeedle" style="top:${progress}%">
                      <div style="position:relative;width:100%">
                        <div class="needle-bar"></div>
                        <div class="needle-arrow"></div>
                        <div class="drag-handle" style="right:12px;top:50%;transform:translateY(-50%)" onpointerdown="startDrag(event)">
                          <div class="drag-handle-dots">
                            <div class="drag-dot"></div><div class="drag-dot"></div>
                            <div class="drag-dot"></div><div class="drag-dot"></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ` : ''}

                  <div class="block-content-inner">
                    <div style="display:flex;flex-direction:column;justify-content:flex-start;height:100%;min-width:0;flex:1">
                      <div style="display:flex;align-items:flex-start;gap:0.75rem">
                        ${(block.icon || isPast) ? `
                          <div class="block-icon-wrap">
                            ${block.icon ? `<span class="block-emoji ${isPast ? 'past-emoji' : ''}">${escHTML(block.icon)}</span>` : ''}
                            ${isPast ? `<div class="block-check-overlay">✅</div>` : ''}
                          </div>
                        ` : ''}
                        <div style="flex:1;min-width:0">
                          <h3 class="block-title">${escHTML(block.title)}</h3>
                          <div class="block-duration-text">${block.durationMinutes} Min</div>
                        </div>
                      </div>
                      ${block.description && (isActive || !isPast) && !isPast ? `
                        <div class="block-description">
                          <ul>${block.description.split('\n').filter(l => l.trim()).map(l => `<li>${escHTML(l)}</li>`).join('')}</ul>
                        </div>
                      ` : ''}
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    // ===== VISUAL TIMER MODES =====
    function renderVisualTimerMode(blocks, viewMode) {
      const block = blocks[state.currentBlockIndex];
      const isComplete = state.currentBlockIndex >= blocks.length;
      const totalDur = blocks.reduce((a, b) => a + b.durationMinutes, 0);

      // --- Sidebar: compact schedule with needle ---
      // Calculate needle position as % of total schedule height
      let needleBlockTop = 0;
      for (let i = 0; i < state.currentBlockIndex && i < blocks.length; i++) {
        needleBlockTop += (blocks[i].durationMinutes / totalDur) * 100;
      }
      const currentBlockPct = !isComplete ? (blocks[state.currentBlockIndex].durationMinutes / totalDur) * 100 : 0;
      const progressInBlock = !isComplete ? Math.min(1, state.secondsElapsedInBlock / (blocks[state.currentBlockIndex].durationMinutes * 60)) : 1;
      const needlePct = needleBlockTop + (currentBlockPct * progressInBlock);

      const sidebarBlocks = blocks.map((b, i) => {
        const isPast = i < state.currentBlockIndex;
        const isActive = i === state.currentBlockIndex;
        const pct = (b.durationMinutes / totalDur) * 100;
        return `
          <div class="vs-block ${isPast ? 'vs-past' : ''} ${isActive ? 'vs-active' : ''}"
               style="height:${pct}%;min-height:var(--min-block-height)"
               data-vs-index="${i}">
            <span class="vs-block-emoji">${b.icon ? escHTML(b.icon) : '⭐'}</span>
            <div class="vs-block-info">
              <div class="vs-block-title">${escHTML(b.title)}</div>
              <div class="vs-block-time">${b.durationMinutes} min</div>
            </div>
          </div>
        `;
      }).join('');

      const sidebar = `
        <div class="visual-sidebar">
          <div class="visual-sidebar-header">Schedule</div>
          <div class="visual-sidebar-scroll" id="vsSidebarScroll">
            <div class="visual-sidebar-blocks" id="vsSidebarBlocks">
              ${sidebarBlocks}
              <!-- Needle. Top is set by positionVsNeedle() right after render with the
                   transition suppressed, so the post-render placement doesn't animate. -->
              <div class="vs-needle dragging" id="vsNeedle">
                <div style="position:relative;width:100%">
                  <div class="vs-needle-bar"></div>
                  <div class="vs-needle-handle" onpointerdown="startVisualDrag(event)">
                    <div class="vs-needle-grip">
                      <div class="vs-needle-dot"></div><div class="vs-needle-dot"></div>
                      <div class="vs-needle-dot"></div><div class="vs-needle-dot"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      // --- Main animation area ---
      let animationContent = '';
      if (isComplete) {
        animationContent = '<div class="complete-screen">All Done! 🎉</div>';
      } else {
        animationContent = renderAnimationContent(block, viewMode);
      }

      return `
        <div class="visual-split">
          <div class="visual-main">${animationContent}</div>
          ${sidebar}
        </div>
      `;
    }

    // ===== ANIMATION RENDERERS =====
    function renderAnimationContent(block, viewMode) {
      const progress01 = Math.min(1, state.secondsElapsedInBlock / (block.durationMinutes * 60));
      const remaining = (block.durationMinutes * 60) - state.secondsElapsedInBlock;
      const countdown = formatTime(remaining);
      const title = escHTML(block.title);
      const ctx = { block, progress01, countdown, title, t: state.secondsElapsedInBlock || 0 };
      const meta = VIEW_MODE_BY_ID[viewMode];
      if (meta && typeof meta.render === 'function') return meta.render(ctx);
      return '';
    }

    function renderFlower(title, progress, countdown) {
      // Hand-crafted inline SVG sunflower. Everything is deterministic from
      // state.secondsElapsedInBlock so animations stay smooth even though the
      // SVG re-renders every 100ms (CSS/SMIL would restart on every re-render).
      const t = state.secondsElapsedInBlock || 0;

      // --- Stem & head position ---
      const maxStemLen = 310;
      const stemLen = progress * maxStemLen;
      const headY = 500 - stemLen; // pot top is at y=500; head rises from there
      // Slight side-to-side sway of the head (deterministic from elapsed time)
      const sway = Math.sin(t * 0.9) * (3 + progress * 5);
      const headX = 200 + sway;
      // Quadratic stem path with a gentle bulge that follows the head sway
      const stemMidY = (500 + headY) / 2;
      const stemCtrlX = 200 + sway * 0.5 - 12; // slight left lean
      const stemPath = stemLen > 4
        ? `M 200,500 Q ${stemCtrlX.toFixed(1)},${stemMidY.toFixed(1)} ${headX.toFixed(1)},${headY.toFixed(1)}`
        : '';

      // --- Head scale ---
      const headScale = Math.min(1, progress * 1.3);
      const headOpacity = Math.max(0, Math.min(1, (progress - 0.05) * 8));

      // --- Leaves fade in at milestones ---
      const leaf1Op = Math.max(0, Math.min(1, (progress - 0.25) * 4));
      const leaf2Op = Math.max(0, Math.min(1, (progress - 0.5) * 4));
      // Leaves attach along the stem — parameterize along the curve
      // (use simple linear interp since quadratic midpoint sampling is close enough)
      const leaf1Y = 500 - stemLen * 0.35;
      const leaf1X = 200 + sway * 0.3 - 6;
      const leaf2Y = 500 - stemLen * 0.65;
      const leaf2X = 200 + sway * 0.5 - 10;

      // --- Petals unfurl one-by-one as progress grows ---
      // Each petal "pops" at a staggered progress threshold (spiral outward feel)
      let petals = '';
      const NUM_PETALS = 12;
      for (let i = 0; i < NUM_PETALS; i++) {
        const angle = i * (360 / NUM_PETALS);
        // Petal i becomes visible at progress i/(NUM_PETALS*1.5); full size a bit later
        const pProg = Math.max(0, Math.min(1, (progress - i / (NUM_PETALS * 1.7)) * 4));
        if (pProg <= 0) continue;
        // Gentle rotation sway per-petal
        const petalSway = Math.sin(t * 1.2 + i * 0.5) * 1.5;
        petals += `<ellipse cx="0" cy="-52" rx="14" ry="32" fill="url(#petalGrad)" stroke="#c2410c" stroke-width="0.8" opacity="0.95" transform="rotate(${(angle + petalSway).toFixed(1)}) scale(${pProg.toFixed(2)})"/>`;
      }

      // --- Seed pattern in the flower center (phyllotactic-ish spiral, simplified) ---
      let seeds = '';
      for (let i = 0; i < 40; i++) {
        const a = i * 137.5 * Math.PI / 180; // golden angle
        const r = 2 + Math.sqrt(i) * 3;
        if (r > 20) break;
        const sx = r * Math.cos(a);
        const sy = r * Math.sin(a);
        const sr = 0.9 + (i % 3) * 0.3;
        seeds += `<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${sr.toFixed(1)}" fill="#1c1917" opacity="0.6"/>`;
      }

      // --- Milestones ---
      const showButterflies = progress >= 0.75;
      const showBee = progress >= 1.0;

      // Butterfly positions & wing flap — all deterministic from elapsed time
      const bf1x = 120 + 50 * Math.sin(t * 0.7);
      const bf1y = 200 + 30 * Math.cos(t * 1.1) + (1 - progress) * 80;
      const bf2x = 290 + 55 * Math.cos(t * 0.6);
      const bf2y = 260 + 40 * Math.sin(t * 0.95);
      // Wing flap: scaleY oscillates 0.35 ↔ 1.0 at ~3 Hz (below Nyquist for 10 Hz sampling)
      const bfFlap = 0.35 + 0.65 * Math.abs(Math.cos(t * 18));

      // Bee hovers in a tilted orbit near the flower head
      const beeX = headX + 70 * Math.cos(t * 1.6);
      const beeY = headY + 25 * Math.sin(t * 1.6) + 5;
      const beeFlap = 0.3 + 0.7 * Math.abs(Math.cos(t * 28));
      // Bee faces direction of motion
      const beeFacing = Math.cos(t * 1.6) < 0 ? -1 : 1;

      return `
        <div class="visual-timer-container" style="padding:0.5rem 0 0.5rem">
          <div class="visual-timer-header"><h2 class="visual-timer-title">${title}</h2></div>
          <div class="flower-scene">
            <svg class="flower-svg" viewBox="0 0 400 620" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#bae6fd"/>
                  <stop offset="55%" stop-color="#fef3c7"/>
                  <stop offset="100%" stop-color="#d9f99d"/>
                </linearGradient>
                <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"  stop-color="#fef9c3"/>
                  <stop offset="70%" stop-color="#fde047"/>
                  <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="petalGrad" cx="50%" cy="25%" r="65%">
                  <stop offset="0%"  stop-color="#fef08a"/>
                  <stop offset="55%" stop-color="#fbbf24"/>
                  <stop offset="100%" stop-color="#d97706"/>
                </radialGradient>
                <radialGradient id="centerGrad" cx="40%" cy="35%" r="65%">
                  <stop offset="0%"  stop-color="#92400e"/>
                  <stop offset="50%" stop-color="#451a03"/>
                  <stop offset="100%" stop-color="#1c1917"/>
                </radialGradient>
                <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%"  stop-color="#15803d"/>
                  <stop offset="50%" stop-color="#22c55e"/>
                  <stop offset="100%" stop-color="#166534"/>
                </linearGradient>
                <radialGradient id="leafGrad" cx="30%" cy="30%" r="80%">
                  <stop offset="0%"  stop-color="#a7f3d0"/>

                  <path d="M 0,0 C 8,-18 35,-22 55,-12 C 40,6 12,10 0,0 Z" fill="url(#leafGrad)" stroke="#14532d" stroke-width="0.8"/>

              <!-- Pot -->

    function renderChickens(block, countdown) {
      // One inline SVG per minute slot: egg with optional crack → hatched chick.
      // All motion (wiggle, wing flap, cheer lift) is computed from elapsed time.
      const t = state.secondsElapsedInBlock || 0;
      const totalMin = block.durationMinutes;
      const currentMin = Math.floor(state.secondsElapsedInBlock / 60);
      const progressInMin = (state.secondsElapsedInBlock % 60) / 60;
      const blockProgress = Math.min(1, state.secondsElapsedInBlock / (totalMin * 60));
      const allDone = blockProgress >= 1.0;

      function slotSvg(prog, idx) {
        const hatched = prog >= 0.85;
        // Egg wiggles increasingly as it gets close to hatching
        const wiggle = (prog >= 0.2 && prog < 0.85)
          ? Math.sin(t * 15 + idx * 0.7) * Math.min(12, (prog - 0.2) * 22)
          : 0;
        // Crack line appears once egg is close to hatching
        const showCrack = prog >= 0.4;
        const crackAlpha = Math.max(0, Math.min(1, (prog - 0.4) * 3));
        // Chick wing flaps after hatching; all chicks lift gently at block end
        const wingAngle = hatched ? Math.sin(t * 7 + idx * 0.5) * 18 : 0;
        const lift = allDone ? Math.sin(t * 2.5 + idx * 0.4) * 3 - 4 : 0;

        // Egg (intact or cracking) view
        if (!hatched) {
          return `
            <svg viewBox="0 0 80 160" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
              <defs>
                <radialGradient id="eggG${idx}" cx="35%" cy="28%" r="70%">
                  <stop offset="0%"  stop-color="#fefce8"/>
                  <stop offset="65%" stop-color="#fef3c7"/>
                  <stop offset="100%" stop-color="#d4a574"/>
                </radialGradient>
              </defs>
              <!-- Grass patch -->
              <ellipse cx="40" cy="150" rx="32" ry="5"  fill="#16a34a" opacity="0.7"/>
              <ellipse cx="40" cy="148" rx="26" ry="3"  fill="#22c55e"/>
              <!-- Tiny blades of grass -->
              <path d="M 12,148 L 14,140 L 16,148" stroke="#166534" stroke-width="1" fill="none"/>
              <path d="M 62,148 L 64,141 L 66,148" stroke="#166534" stroke-width="1" fill="none"/>

              <!-- Egg -->
              <g transform="translate(40 110) rotate(${wiggle.toFixed(1)})">
                <ellipse cx="0" cy="30" rx="18" ry="3" fill="#000" opacity="0.25"/>
                <ellipse cx="0" cy="0" rx="20" ry="27" fill="url(#eggG${idx})" stroke="#a16207" stroke-width="0.5"/>
                <ellipse cx="-6" cy="-10" rx="7" ry="12" fill="white" opacity="0.35"/>
                <!-- Speckle dots -->
                <circle cx="-4"  cy="6"   r="1.3" fill="#a16207" opacity="0.55"/>
                <circle cx="7"   cy="-6"  r="1"   fill="#a16207" opacity="0.55"/>
                <circle cx="-9"  cy="-3"  r="0.9" fill="#a16207" opacity="0.55"/>
                <circle cx="5"   cy="11"  r="1.1" fill="#a16207" opacity="0.55"/>
                <circle cx="-2"  cy="-15" r="0.7" fill="#a16207" opacity="0.5"/>
                ${showCrack ? `
                  <path d="M 0,-22 L -4,-15 L 2,-9 L -3,-3 L 3,3 L -2,9"
                        fill="none" stroke="#57534e"
                        stroke-width="${(1.3 + crackAlpha * 0.5).toFixed(2)}"
                        stroke-linecap="round" opacity="${crackAlpha.toFixed(2)}"/>
                  ${crackAlpha > 0.6 ? `
                    <path d="M -2,-10 L -7,-5 L -3,0" fill="none" stroke="#57534e"
                          stroke-width="1" stroke-linecap="round" opacity="${crackAlpha.toFixed(2)}"/>
                  ` : ''}
                ` : ''}
              </g>
            </svg>`;
        }

        // Hatched chick view
        return `
          <svg viewBox="0 0 80 160" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
            <!-- Grass -->
            <ellipse cx="40" cy="150" rx="32" ry="5" fill="#16a34a" opacity="0.7"/>
            <ellipse cx="40" cy="148" rx="26" ry="3" fill="#22c55e"/>
            <path d="M 12,148 L 14,140 L 16,148" stroke="#166534" stroke-width="1" fill="none"/>
            <path d="M 62,148 L 64,141 L 66,148" stroke="#166534" stroke-width="1" fill="none"/>

            <!-- Broken egg shell halves -->
            <path d="M 14,140 Q 10,144 14,150 Q 22,152 26,146 Q 24,140 14,140 Z"
                  fill="#fef3c7" stroke="#a16207" stroke-width="0.6"/>
            <path d="M 54,142 Q 64,142 66,150 Q 60,152 52,150 Q 50,144 54,142 Z"
                  fill="#fef3c7" stroke="#a16207" stroke-width="0.6"/>

            <!-- Chick -->
            <g transform="translate(40 ${(105 + lift).toFixed(1)})">
              <!-- Ground shadow -->
              <ellipse cx="0" cy="35" rx="14" ry="3" fill="#000" opacity="0.2"/>
              <!-- Body -->
              <ellipse cx="0" cy="10" rx="16" ry="17" fill="#fde047"/>
              <ellipse cx="-5" cy="5" rx="8" ry="10" fill="#fef08a" opacity="0.85"/>
              <!-- Tail tuft -->
              <path d="M -14,6 L -20,0 L -14,4 Z" fill="#facc15"/>
              <!-- Wing (flaps) -->
              <g transform="rotate(${wingAngle.toFixed(1)} -8 4)">
                <path d="M -10,0 Q -20,4 -14,14 Q -6,10 -10,0 Z" fill="#f59e0b"/>
                <path d="M -13,6 Q -17,8 -15,12" fill="none" stroke="#c2410c" stroke-width="0.6"/>
              </g>
              <!-- Head -->
              <circle cx="0" cy="-8" r="12" fill="#fde047"/>
              <circle cx="-3" cy="-11" r="4" fill="#fef08a" opacity="0.85"/>
              <!-- Comb (tiny) -->
              <path d="M -2,-19 Q 0,-22 2,-19 Q 4,-21 4,-18" fill="none" stroke="#ef4444" stroke-width="1.2"/>
              <!-- Beak -->
              <path d="M 8,-8 L 15,-6 L 8,-4 Z" fill="#f97316" stroke="#c2410c" stroke-width="0.3"/>
              <!-- Eye -->
              <circle cx="3" cy="-12" r="2.3" fill="white"/>
              <circle cx="3.5" cy="-12" r="1.5" fill="#1c1917"/>
              <circle cx="3.8" cy="-12.4" r="0.6" fill="white"/>
              <!-- Feet -->
              <line x1="-5" y1="26" x2="-5" y2="31" stroke="#f97316" stroke-width="2.2" stroke-linecap="round"/>
              <line x1="5"  y1="26" x2="5"  y2="31" stroke="#f97316" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M -8,31 L -2,31" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
              <path d="M 2,31  L 8,31"  stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
            </g>
          </svg>`;
      }

      let items = '';
      for (let i = 0; i < totalMin; i++) {
        const isPast = i < currentMin;
        const isCurrent = i === currentMin;
        const prog = isPast ? 1 : isCurrent ? progressInMin : 0;
        items += `<div class="visual-item">${slotSvg(prog, i)}</div>`;
      }

      return `<div class="visual-timer-container">
        <div class="visual-timer-header"><h2 class="visual-timer-title">${escHTML(block.title)}</h2></div>
        <div class="visual-items-grid">${items}</div>
        <div class="visual-countdown-overlay" id="visualCountdown">${countdown}</div>
      </div>`;
    }

    function renderGophers(block, countdown) {
      // Per-minute SVG gopher with proper anatomy. Clipped by a path that unions
      // "above ground" + "inside hole" so the gopher appears to emerge through it.
      const t = state.secondsElapsedInBlock || 0;
      const totalMin = block.durationMinutes;
      const currentMin = Math.floor(state.secondsElapsedInBlock / 60);
      const progressInMin = (state.secondsElapsedInBlock % 60) / 60;
      const blockProgress = Math.min(1, state.secondsElapsedInBlock / (totalMin * 60));
      const allDone = blockProgress >= 1.0;

      function gopherSvg(prog, idx) {
        // Rise from underground. riseY=55 = fully underground; riseY=0 = fully up.
        const riseY = (1 - prog) * 55;
        // Small head turn when nearly/fully up (a curious look-around)
        const headTurn = prog >= 0.9 ? Math.sin(t * 1.8 + idx * 0.35) * 7 : 0;
        // All gophers wave once the whole block is done
        const waveArm = allDone ? Math.sin(t * 3 + idx * 0.45) * 25 : 0;

        return `
          <svg viewBox="0 0 80 160" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
            <defs>
              <clipPath id="gClip${idx}">
                <!-- Above the ground line -->
                <rect x="0" y="0" width="80" height="112"/>
                <!-- Plus the hole interior, so the gopher is visible emerging through -->
                <ellipse cx="40" cy="114" rx="18" ry="7"/>
              </clipPath>
              <radialGradient id="gFur${idx}" cx="35%" cy="30%" r="75%">
                <stop offset="0%"  stop-color="#d4a574"/>
                <stop offset="55%" stop-color="#a16207"/>
                <stop offset="100%" stop-color="#713f12"/>
              </radialGradient>
            </defs>

            <!-- Background grass patches -->
            <rect x="0" y="108" width="80" height="52" fill="#4d7c0f"/>
            <rect x="0" y="108" width="80" height="4"  fill="#65a30d"/>
            <!-- Grass blades on either side of the hole -->
            <g fill="none" stroke="#166534" stroke-width="1.3" stroke-linecap="round">
              <path d="M 6,112  L 8,104  L 10,112"/>
              <path d="M 11,112 L 13,101 L 15,112"/>
              <path d="M 16,112 L 18,105 L 20,112"/>
              <path d="M 60,112 L 62,104 L 64,112"/>
              <path d="M 65,112 L 67,102 L 69,112"/>
              <path d="M 70,112 L 72,106 L 74,112"/>
            </g>

            <!-- Dirt mound rim behind hole -->
            <ellipse cx="40" cy="116" rx="24" ry="7" fill="#78350f"/>
            <ellipse cx="40" cy="114" rx="22" ry="5" fill="#92400e"/>

            <!-- Hole interior (dark) — sits just below ground line -->
            <ellipse cx="40" cy="116" rx="17" ry="6" fill="#1c1917"/>
            <ellipse cx="40" cy="117" rx="13" ry="3.5" fill="#0c0a09"/>

            <!-- Gopher, clipped so below-ground parts disappear -->
            <g clip-path="url(#gClip${idx})">
              <g transform="translate(40 ${(92 + riseY).toFixed(1)})">
                <!-- Body -->
                <ellipse cx="0" cy="10" rx="14" ry="16" fill="url(#gFur${idx})"/>
                <!-- Belly patch -->
                <ellipse cx="0" cy="15" rx="8" ry="10" fill="#e4cf9b"/>
                <!-- Waving arm (only during final celebration) -->
                ${allDone ? `
                  <g transform="rotate(${waveArm.toFixed(1)} -11 -2)">
                    <ellipse cx="-14" cy="-5" rx="3.5" ry="8" fill="url(#gFur${idx})"/>
                    <circle  cx="-16" cy="-12" r="3" fill="url(#gFur${idx})"/>
                    <circle  cx="-16" cy="-12" r="1.2" fill="#fda4af" opacity="0.7"/>
                  </g>
                ` : ''}

                <!-- Head (rotates slightly when popped up) -->
                <g transform="rotate(${headTurn.toFixed(1)} 0 -5)">
                  <circle cx="0" cy="-5" r="13" fill="url(#gFur${idx})"/>
                  <!-- Cheek highlight -->
                  <ellipse cx="-4" cy="-3" rx="5" ry="6" fill="#d4a574" opacity="0.6"/>
                  <!-- Ears (outer + inner pink) -->
                  <ellipse cx="-9" cy="-14" rx="3.2" ry="5" fill="#713f12"/>
                  <ellipse cx="9"  cy="-14" rx="3.2" ry="5" fill="#713f12"/>
                  <ellipse cx="-9" cy="-14" rx="1.5" ry="3" fill="#fda4af"/>
                  <ellipse cx="9"  cy="-14" rx="1.5" ry="3" fill="#fda4af"/>
                  <!-- Eyes -->
                  <circle cx="-5" cy="-7" r="2.6" fill="#1c1917"/>
                  <circle cx="5"  cy="-7" r="2.6" fill="#1c1917"/>
                  <circle cx="-4.2" cy="-7.6" r="0.8" fill="white"/>
                  <circle cx="5.8"  cy="-7.6" r="0.8" fill="white"/>
                  <!-- Nose -->
                  <ellipse cx="0" cy="-1" rx="2.2" ry="1.6" fill="#1c1917"/>
                  <circle cx="-0.6" cy="-1.3" r="0.4" fill="white"/>
                  <!-- Mouth (little Y shape) -->
                  <path d="M 0,1 L 0,3 M 0,3 L -2,5 M 0,3 L 2,5"
                        stroke="#1c1917" stroke-width="0.7" fill="none" stroke-linecap="round"/>
                  <!-- Whiskers -->
                  <line x1="-3" y1="-1" x2="-11" y2="-2" stroke="#1c1917" stroke-width="0.5"/>
                  <line x1="-3" y1="1"  x2="-11" y2="2"  stroke="#1c1917" stroke-width="0.5"/>
                  <line x1="3"  y1="-1" x2="11"  y2="-2" stroke="#1c1917" stroke-width="0.5"/>
                  <line x1="3"  y1="1"  x2="11"  y2="2"  stroke="#1c1917" stroke-width="0.5"/>
                  <!-- Buck teeth -->
                  <rect x="-2"   y="3" width="1.8" height="3.5" fill="white" stroke="#57534e" stroke-width="0.3"/>
                  <rect x="0.2"  y="3" width="1.8" height="3.5" fill="white" stroke="#57534e" stroke-width="0.3"/>
                </g>
              </g>
            </g>

            <!-- Front hole lip on top (subtle rim line) -->
            <path d="M 22,114 Q 40,117 58,114" fill="none" stroke="#451a03"
                  stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
          </svg>`;
      }

      let items = '';
      for (let i = 0; i < totalMin; i++) {
        const isPast = i < currentMin;
        const isCurrent = i === currentMin;
        const prog = isPast ? 1 : isCurrent ? progressInMin : 0;
        items += `<div class="visual-item">${gopherSvg(prog, i)}</div>`;
      }

      return `<div class="visual-timer-container">
        <div class="visual-timer-header"><h2 class="visual-timer-title">${escHTML(block.title)}</h2></div>
        <div class="visual-items-grid">${items}</div>
        <div class="visual-countdown-overlay" id="visualCountdown">${countdown}</div>
      </div>`;
    }

    function renderBalloon(progress, countdown, title) {
      // Inline SVG balloon scene: teardrop balloon with multi-stop radial gradient,
      // gaussian-blur drop shadow, two-layer highlight + rim darkening; a CURLY
      // ribbon that spirals down from the knot with subtle sway; a proper sun
      // with rays, two passing birds, and drifting SVG clouds.
      const t = state.secondsElapsedInBlock || 0;
      const balloonScale = 0.45 + progress * 0.55; // 0.45 → 1.0
      const floating = progress >= 0.97;
      const lcdScale = Math.max(0.7, balloonScale);

      // Bird positions (deterministic)
      const b1x = -50 + ((t * 12) % 900);
      const b1y = 60 + Math.sin(t * 0.4) * 10;
      const b2x = -80 + ((t * 10 + 300) % 900);
      const b2y = 110 + Math.sin(t * 0.3 + 1) * 8;
      // Wing flap (fast oscillation)
      const b1flap = Math.sin(t * 8) * 0.6;
      const b2flap = Math.sin(t * 8 + 1.5) * 0.6;

      return `
        <div class="visual-timer-container" style="justify-content:center;padding-bottom:1rem">
          <div class="visual-timer-header"><h2 class="visual-timer-title">${title}</h2></div>
          <div class="balloon-scene">
            <!-- Background atmosphere: sun + rays + clouds + birds, fills container -->
            <svg class="balloon-atmosphere" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="blSunGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"  stop-color="#fef9c3"/>
                  <stop offset="55%" stop-color="#fde047"/>
                  <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
                </radialGradient>
              </defs>
              <!-- Sun with soft halo and rays -->
              <g transform="translate(680 90)">
                <circle r="72" fill="url(#blSunGrad)"/>
                <circle r="34" fill="#fde047"/>
                <circle r="22" fill="#fef08a" opacity="0.8"/>
                <!-- Rays -->
                ${[0,30,60,90,120,150,180,210,240,270,300,330].map(a => {
                  const rad = a * Math.PI / 180;
                  const r1 = 45 + Math.sin(t * 2 + a * 0.05) * 2;
                  const r2 = 62 + Math.sin(t * 2 + a * 0.05) * 2;
                  return `<line x1="${(r1*Math.cos(rad)).toFixed(1)}" y1="${(r1*Math.sin(rad)).toFixed(1)}" x2="${(r2*Math.cos(rad)).toFixed(1)}" y2="${(r2*Math.sin(rad)).toFixed(1)}" stroke="#fde047" stroke-width="4" stroke-linecap="round"/>`;
                }).join('')}
              </g>

              </g>
            </svg>

            <div class="balloon-svg-container ${floating ? 'balloon-floating' : ''}">
              <svg class="balloon-svg" viewBox="0 0 300 520" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">

                <!-- Main balloon group: grows with progress, centered on (150, 160) -->

                    <!-- Main curly ribbon -->

                    <!-- Ribbon highlight -->

    }

    function renderBomb(block, progress, countdown, title) {
      // Classic cartoon round bomb with a long winding fuse. Fuse length and
      // number of waves scale with block duration — longer blocks = more
      // winding fuse. The fuse burns from the lit tip toward the bomb as time
      // passes; a bright sparkle rides the burn point. At 100% a cartoon
      // "BOOM!" bursts from the bomb (no scary imagery — starburst + text).
      const t = state.secondsElapsedInBlock || 0;
      const durationMin = block.durationMinutes;

      // Scene layout in viewBox coords
      const vbW = 700, vbH = 500;
      const bombCX = 140, bombCY = 410;      // bomb center (bottom-left)
      const fuseTipX = 620, fuseTipY = 70;    // fuse tip (upper-right)

      // Number of sinusoidal waves in the winding fuse — scales with duration.
      // Short block (~3 min) = 2 waves; 20 min = 6; 60 min = 10 (capped).
      const numWaves = Math.max(2, Math.min(10, Math.ceil(durationMin / 5) + 2));

      // Generate the fuse as a polyline with many waypoints along a sine-displaced
      // straight path from bomb to tip. Evenly spaced in parameter.
      const N = numWaves * 24; // more samples than visible waves for smoothness
      const dx = fuseTipX - bombCX, dy = fuseTipY - bombCY;
      const baseLen = Math.sqrt(dx * dx + dy * dy);
      const perpX = -dy / baseLen, perpY = dx / baseLen;
      const amp = 65; // wave amplitude
      const waypoints = [];
      for (let i = 0; i <= N; i++) {
        const u = i / N;
        const bx = bombCX + dx * u;
        const by = bombCY + dy * u;
        // Taper amplitude at both ends so the fuse joins the bomb cleanly and
        // terminates neatly at the tip.
        const taper = Math.sin(u * Math.PI); // 0 at ends, 1 in the middle
        const wave = Math.sin(u * numWaves * Math.PI * 2) * amp * taper;
        waypoints.push({ x: bx + perpX * wave, y: by + perpY * wave });
      }

      // Build the path string + measure segment lengths for accurate burn
      // position (cumulative arc length).
      const cumLen = [0];
      let pathD = `M ${waypoints[0].x.toFixed(1)},${waypoints[0].y.toFixed(1)}`;
      for (let i = 1; i < waypoints.length; i++) {
        pathD += ` L ${waypoints[i].x.toFixed(1)},${waypoints[i].y.toFixed(1)}`;
        const sx = waypoints[i].x - waypoints[i-1].x;
        const sy = waypoints[i].y - waypoints[i-1].y;
        cumLen.push(cumLen[i-1] + Math.sqrt(sx * sx + sy * sy));
      }
      const totalLen = cumLen[cumLen.length - 1];
      const visibleLen = (1 - progress) * totalLen; // length from bomb to burn point

      // Find the waypoint at the burn point via binary search on cumLen
      let burnIdx = 0;
      {
        let lo = 0, hi = cumLen.length - 1;
        while (lo < hi) {
          const mid = (lo + hi) >> 1;
          if (cumLen[mid] < visibleLen) lo = mid + 1; else hi = mid;
        }
        burnIdx = lo;
      }
      const burnPt = waypoints[Math.max(0, Math.min(waypoints.length - 1, burnIdx))];

      // Escape: the closer we get to the end, the more the bomb shakes (CSS class)
      const tremoring = progress >= 0.88 && progress < 1.0;

      // Detonation state: last moment — replace bomb + fuse with cartoon BOOM
      const exploded = progress >= 1.0;

      // Sparkle twinkle (fast oscillation on the flame at the burn point)
      const twinkle = 0.7 + 0.3 * Math.abs(Math.sin(t * 18));
      const flickerJitterX = Math.sin(t * 22) * 2;
      const flickerJitterY = Math.cos(t * 20) * 2;

      // Starburst for BOOM
      let boomHTML = '';
      if (exploded) {
        const age = Math.min(1, (t % 2) / 0.6); // 0..1 over ~0.6s
        const r1 = 100 + age * 50;
        const r2 = 170 + age * 70;
        const op = Math.max(0, 1 - age);
        let rays = '';
        for (let i = 0; i < 14; i++) {
          const a = i * (360 / 14) * Math.PI / 180;
          const inner = r1 + Math.sin(t * 10 + i) * 8;
          const outer = r2 + Math.cos(t * 10 + i * 0.7) * 15;
          rays += `<path d="M ${(inner * Math.cos(a)).toFixed(1)},${(inner * Math.sin(a)).toFixed(1)} L ${(outer * Math.cos(a)).toFixed(1)},${(outer * Math.sin(a)).toFixed(1)}" stroke="#fbbf24" stroke-width="10" stroke-linecap="round" opacity="${op.toFixed(2)}"/>`;
        }
        boomHTML = `
          <g transform="translate(${bombCX},${bombCY})">
            <!-- Soft fireball -->
            <circle r="${(140 + age * 30).toFixed(1)}" fill="url(#bombBoom)" opacity="${(0.85 * op).toFixed(2)}"/>
            <!-- Inner bright core -->
            <circle r="${(55 + age * 20).toFixed(1)}" fill="#fef9c3" opacity="${(0.9 * op).toFixed(2)}"/>
            <!-- Starburst rays -->
            ${rays}
            <!-- Smoke puffs -->
            <circle cx="-60" cy="-30" r="24" fill="#94a3b8" opacity="${(0.55 * op).toFixed(2)}"/>
            <circle cx="70"  cy="-40" r="28" fill="#cbd5e1" opacity="${(0.55 * op).toFixed(2)}"/>
            <circle cx="0"   cy="-75" r="30" fill="#94a3b8" opacity="${(0.55 * op).toFixed(2)}"/>
            <!-- BOOM! text -->
            <text x="0" y="10" text-anchor="middle" font-family="Impact,Arial,sans-serif"
                  font-size="76" font-weight="900" fill="#dc2626" stroke="#fef9c3" stroke-width="4"
                  paint-order="stroke">BOOM!</text>
          </g>`;
      }

      return `
        <div class="visual-timer-container" style="padding:0.5rem 0 0.5rem">
          <div class="visual-timer-header"><h2 class="visual-timer-title">${title}</h2></div>
          <div class="bomb-scene">
            <svg class="bomb-svg ${tremoring ? 'bomb-tremor' : ''}" viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <!-- Bomb body: classic cartoon round black with metallic sheen -->
                <radialGradient id="bombBody" cx="35%" cy="28%" r="75%">
                  <stop offset="0%"  stop-color="#64748b"/>
                  <stop offset="40%" stop-color="#1e293b"/>
                  <stop offset="100%" stop-color="#020617"/>
                </radialGradient>
                <!-- Sparkle gradient -->
                <radialGradient id="bombSpark" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stop-color="white"/>
                  <stop offset="30%"  stop-color="#fef08a"/>
                  <stop offset="60%"  stop-color="#f97316"/>
                  <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
                </radialGradient>
                <!-- Boom fireball gradient -->
                <radialGradient id="bombBoom" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stop-color="#fef9c3"/>
                  <stop offset="35%"  stop-color="#fbbf24"/>
                  <stop offset="70%"  stop-color="#ef4444"/>
                  <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
                </radialGradient>
                <!-- LCD glow filter (subtle) -->
                <filter id="bombLcdGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
                  <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
              </defs>

              ${!exploded ? `
                <!-- Fuse drawn in layers: dark shadow → rope base → twist highlights -->
                <!-- Shadow -->
                <path d="${pathD}" fill="none" stroke="rgba(0,0,0,0.25)"
                      stroke-width="9" stroke-linecap="round"
                      stroke-dasharray="${visibleLen.toFixed(1)} 99999"
                      transform="translate(2 3)"/>
                <!-- Main rope body -->
                <path d="${pathD}" fill="none" stroke="#92400e"
                      stroke-width="7" stroke-linecap="round"
                      stroke-dasharray="${visibleLen.toFixed(1)} 99999"/>
                <!-- Rope twist (lighter inner highlight) -->
                <path d="${pathD}" fill="none" stroke="#d97706"
                      stroke-width="3.5" stroke-linecap="round"
                      stroke-dasharray="${visibleLen.toFixed(1)} 99999"/>
                <!-- Rope cross-hatching pattern -->
                <path d="${pathD}" fill="none" stroke="#78350f"
                      stroke-width="3" stroke-linecap="butt"
                      stroke-dasharray="3 5 ${visibleLen.toFixed(1)} 99999"/>
              ` : ''}

              ${!exploded ? `
                <!-- Bomb body -->
                <g transform="translate(${bombCX} ${bombCY})">
                  <!-- Ground shadow under bomb -->
                  <ellipse cx="0" cy="52" rx="52" ry="9" fill="#000" opacity="0.3"/>
                  <!-- Main sphere -->
                  <circle r="52" fill="url(#bombBody)" stroke="#000" stroke-width="2.5"/>
                  <!-- Large specular highlight -->
                  <ellipse cx="-18" cy="-20" rx="15" ry="22" fill="white" opacity="0.22"
                           transform="rotate(-22 -18 -20)"/>
                  <!-- Small bright spot -->
                  <ellipse cx="-22" cy="-28" rx="5" ry="10" fill="white" opacity="0.7"
                           transform="rotate(-22 -22 -28)"/>
                  <!-- Rim dark edge -->
                  <path d="M 30,-30 C 48,-5 48,25 30,45" fill="none"
                        stroke="rgba(0,0,0,0.55)" stroke-width="6" stroke-linecap="round"/>
                  <!-- Fuse collar: metallic cap where fuse attaches -->
                  <g transform="translate(0 -54)">
                    <rect x="-11" y="-2" width="22" height="8" fill="#52525b" stroke="#27272a" stroke-width="1"/>
                    <rect x="-11" y="-2" width="22" height="2.5" fill="#a1a1aa"/>
                    <rect x="-11" y="4" width="22" height="1.5" fill="#18181b"/>
                  </g>
                  <!-- LCD readout on the bomb face -->
                  <g transform="translate(0 8)">
                    <rect x="-34" y="-12" width="68" height="24" rx="3" fill="#052e16" stroke="#14532d" stroke-width="1.5"/>
                    <rect x="-34" y="-12" width="68" height="5"  fill="#000"/>
                    <text x="0" y="4" text-anchor="middle"
                          font-family="'Courier New',Courier,monospace" font-size="16" font-weight="700"
                          fill="#4ade80">${countdown}</text>
                  </g>
                </g>
              ` : ''}

              ${!exploded ? `
                <!-- Sparkle riding the burn point on the fuse -->
                <g transform="translate(${(burnPt.x + flickerJitterX).toFixed(1)} ${(burnPt.y + flickerJitterY).toFixed(1)})">
                  <!-- Soft halo -->
                  <circle r="${(22 * twinkle).toFixed(1)}" fill="url(#bombSpark)"/>
                  <!-- Hot core -->
                  <circle r="${(9 * twinkle).toFixed(1)}" fill="#fef08a"/>
                  <circle r="4" fill="white"/>
                  <!-- Radiating sparkle rays -->
                  ${[0,45,90,135,180,225,270,315].map(a => {
                    const rad = a * Math.PI / 180;
                    const r = 14 + Math.sin(t * 25 + a) * 4;
                    return `<line x1="0" y1="0" x2="${(r * Math.cos(rad)).toFixed(1)}" y2="${(r * Math.sin(rad)).toFixed(1)}" stroke="#fde047" stroke-width="1.8" stroke-linecap="round" opacity="${twinkle.toFixed(2)}"/>`;
                  }).join('')}
                  <!-- Tiny ember trails drifting away from the burn point -->
                  ${[0, 1, 2].map(i => {
                    const phase = ((t * 2 + i * 0.6) % 1);
                    const tx = Math.cos(i * 2.1) * phase * 12;
                    const ty = -phase * 18;
                    const op = (1 - phase) * 0.85;
                    return `<circle cx="${tx.toFixed(1)}" cy="${ty.toFixed(1)}" r="1.5" fill="#fbbf24" opacity="${op.toFixed(2)}"/>`;
                  }).join('')}
                </g>
              ` : ''}

              <!-- BOOM at 100% -->
              ${boomHTML}
            </svg>
          </div>
          <div class="visual-countdown-overlay" id="visualCountdown" style="display:none">${countdown}</div>
        </div>`;
    }

    function renderHourglass(progress, countdown, title) {
      // Inline SVG hourglass: brass frame, glass bulbs with reflections, and
      // a falling sand stream. Top sand pile shrinks, bottom pile grows. All
      // animation is deterministic from elapsed time.
      const t = state.secondsElapsedInBlock || 0;

      // Sand levels: percentage-of-bulb filled (0..1)
      const topFill = Math.max(0, 1 - progress);
      const botFill = Math.min(1, progress);
      const streamActive = progress > 0.005 && progress < 0.995;
      // Subtle wobble on falling grains
      const streamSway = streamActive ? Math.sin(t * 12) * 1.5 : 0;

      // Milestones
      const showSparkle = progress >= 0.9 && progress < 1.0;
      const finalGlow   = progress >= 1.0;
      const sparkleAlpha = showSparkle ? 0.5 + 0.5 * Math.sin(t * 6) : 0;

      // Frame paint colors differ if glowing
      const capFill = finalGlow ? 'url(#hgCapGlow)' : 'url(#hgCap)';

      return `

                  <stop offset="50%" stop-color="rgba(224,242,254,0.15)"/>
                  <stop offset="100%" stop-color="rgba(186,230,253,0.35)"/>
                </linearGradient>
                <!-- Clips to the bulb silhouettes so sand stays inside -->

                  <path d="M 60,40 L 200,40 Q 200,120 140,185 Q 130,195 130,210 Q 130,195 120,185 Q 60,120 60,40 Z"/>
                </clipPath>
                <clipPath id="hgBotClip">
                  <path d="M 130,210 Q 130,225 140,235 Q 200,300 200,380 L 60,380 Q 60,300 120,235 Q 130,225 130,210 Z"/>
                </clipPath>
                <!-- Final-glow halo -->
                <radialGradient id="hgHalo" cx="50%" cy="50%" r="55%">
                  <stop offset="0%"  stop-color="rgba(251,191,36,0.5)"/>
                  <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
                </radialGradient>
              </defs>

              <!-- Glow halo when finished -->
              ${finalGlow ? '<ellipse cx="130" cy="210" rx="130" ry="200" fill="url(#hgHalo)"/>' : ''}

              <!-- Top cap plate -->
              <rect x="40" y="20" width="180" height="22" rx="4" fill="${capFill}" stroke="#451a03" stroke-width="1.5"/>

              <!-- Bottom cap plate -->
              <rect x="40" y="378" width="180" height="22" rx="4" fill="${capFill}" stroke="#451a03" stroke-width="1.5"/>
              <rect x="40" y="378" width="180" height="5"  rx="2" fill="#fde047" opacity="0.5"/>

              <!-- Side posts (twisted-looking wood) -->
              <rect x="42" y="40" width="10" height="340" fill="url(#hgPost)" stroke="#451a03" stroke-width="0.8"/>
              <rect x="208" y="40" width="10" height="340" fill="url(#hgPost)" stroke="#451a03" stroke-width="0.8"/>
              <!-- Decorative bands on the posts -->
              <rect x="40" y="100" width="14" height="3" fill="#451a03"/>
              <rect x="40" y="200" width="14" height="3" fill="#451a03"/>
              <rect x="40" y="300" width="14" height="3" fill="#451a03"/>
              <rect x="206" y="100" width="14" height="3" fill="#451a03"/>
              <rect x="206" y="200" width="14" height="3" fill="#451a03"/>
              <rect x="206" y="300" width="14" height="3" fill="#451a03"/>

              <!-- Glass silhouette (two bulbs joined at a pinch) -->
              <!-- Top bulb -->
              <path d="M 60,40 L 200,40 Q 200,120 140,185 Q 130,195 130,210 Q 130,195 120,185 Q 60,120 60,40 Z"
                    fill="url(#hgGlass)" stroke="#0c4a6e" stroke-width="2"/>
              <!-- Bottom bulb -->
              <path d="M 130,210 Q 130,225 140,235 Q 200,300 200,380 L 60,380 Q 60,300 120,235 Q 130,225 130,210 Z"
                    fill="url(#hgGlass)" stroke="#0c4a6e" stroke-width="2"/>

              <!-- Sand in top bulb (clipped to bulb silhouette, grows from bottom of bulb UP as top fill decreases) -->
              <g clip-path="url(#hgTopClip)">
                <!-- Sand level: at topFill=1 sand fills the bulb; at 0 it's empty -->
                <!-- Draw from bottom of bulb region upward -->
                <rect x="40" y="${(210 - topFill * 170).toFixed(1)}" width="180" height="${(topFill * 170).toFixed(1)}"
                      fill="url(#hgSand)"/>
                <!-- Concave top surface (looks like a funnel) -->
                ${topFill > 0.02 ? `
                  <path d="M 60,${(210 - topFill * 170).toFixed(1)} L 200,${(210 - topFill * 170).toFixed(1)} L 130,${(220 - topFill * 170).toFixed(1)} Z"
                        fill="#713f12" opacity="0.7"/>
                ` : ''}
              </g>

              <!-- Sand stream falling through the pinch -->
              ${streamActive ? `
                <rect x="${(128.5 + streamSway).toFixed(1)}" y="195"
                      width="3" height="50" fill="url(#hgSand)"/>
                <!-- Individual falling grains for extra life -->
                <circle cx="${(130 + streamSway).toFixed(1)}" cy="${(200 + ((t * 180) % 40)).toFixed(1)}" r="1.5" fill="#fbbf24"/>
                <circle cx="${(129 + streamSway * 0.5).toFixed(1)}" cy="${(215 + ((t * 180 + 20) % 40)).toFixed(1)}" r="1.2" fill="#fde047"/>
                <circle cx="${(131 - streamSway * 0.5).toFixed(1)}" cy="${(230 + ((t * 180 + 30) % 40)).toFixed(1)}" r="1.3" fill="#fbbf24"/>
              ` : ''}

              <!-- Sand in bottom bulb (clipped to bulb silhouette, cone-shaped pile) -->
              <g clip-path="url(#hgBotClip)">
                <!-- Bottom sand: rises as progress grows -->
                <rect x="40" y="${(380 - botFill * 170).toFixed(1)}" width="180" height="${(botFill * 170).toFixed(1)}"
                      fill="url(#hgSand)"/>
                <!-- Conical pile peak -->
                ${botFill > 0.02 ? `
                  <path d="M 80,${(380 - botFill * 170 + 5).toFixed(1)} L 130,${(380 - botFill * 170 - 8).toFixed(1)} L 180,${(380 - botFill * 170 + 5).toFixed(1)} Z"
                        fill="url(#hgSand)"/>
                  <path d="M 125,${(380 - botFill * 170 - 3).toFixed(1)} L 130,${(380 - botFill * 170 - 8).toFixed(1)} L 135,${(380 - botFill * 170 - 3).toFixed(1)} Z"
                        fill="#fde047" opacity="0.6"/>
                ` : ''}
              </g>

              <!-- Glass highlights / reflections -->
              <path d="M 72,50 Q 68,120 115,190" fill="none" stroke="white" stroke-width="2" opacity="0.35"/>
              <path d="M 75,60 Q 72,100 95,160" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
              <path d="M 145,230 Q 180,285 190,365" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

              <!-- 90% sparkle on the top sand surface -->
              ${showSparkle ? `
                <g transform="translate(130,${(210 - topFill * 170 - 3).toFixed(1)})" opacity="${sparkleAlpha.toFixed(2)}">
                  <path d="M 0,-10 L 2,-2 L 10,0 L 2,2 L 0,10 L -2,2 L -10,0 L -2,-2 Z" fill="#fef9c3"/>
                  <circle cx="0" cy="0" r="2.5" fill="white"/>
                </g>
              ` : ''}
            </svg>
          </div>
          <div class="visual-countdown-overlay" id="visualCountdown">${countdown}</div>
        </div>`;
    }

    function renderCandle(progress, countdown, title) {
      // Inline SVG candle: tapered wax body that shrinks, wick that shortens,
      // real teardrop flame (blue inner + yellow outer + glow halo) that
      // flickers deterministically from elapsed time, and wax drips that
      // elongate as the candle melts.
      const t = state.secondsElapsedInBlock || 0;

      // Wax height in viewBox units. Max 240, min 20 so stub always visible.
      const maxWaxH = 240;
      const waxH = Math.max(20, (1 - progress) * maxWaxH);
      const waxTopY = 400 - waxH; // candle stands at y=400 (on holder top)
      const wickTopY = waxTopY - 14; // wick protrudes 14 units
      const showFlame = progress < 0.98;
      const showSmoke = progress >= 0.98;

      // Flame flicker — faster & wobblier near the end
      const flickerFreq = progress >= 0.9 ? 14 : 7;
      const flickerWidth = 1 + 0.15 * Math.sin(t * flickerFreq);
      const flickerHeight = 1 + 0.12 * Math.cos(t * flickerFreq * 0.8);
      const flickerSway = Math.sin(t * flickerFreq * 0.7) * 2.5;

      // Drips lengthen with progress (more wax has run down)
      const showDrips = progress > 0.05;
      const drip1H = Math.min(waxH * 0.8, 20 + progress * 100);
      const drip2H = Math.min(waxH * 0.65, 12 + progress * 80);
      const drip3H = progress > 0.3 ? Math.min(waxH * 0.7, 15 + progress * 90) : 0;

      // Smoke wisp trajectory (when flame has gone out)
      const smokePhase = (t % 3) / 3;
      const smokeY = wickTopY - smokePhase * 120;
      const smokeX = 150 + smokePhase * 10 + Math.sin(smokePhase * 6) * 8;
      const smokeR = 3 + smokePhase * 10;
      const smokeOp = (1 - smokePhase) * 0.5;

      return `
        <div class="visual-timer-container" style="padding:0.5rem 0 0.5rem">
          <div class="visual-timer-header"><h2 class="visual-timer-title">${title}</h2></div>
          <div class="candle-scene">
            <svg class="candle-svg" viewBox="0 0 300 500" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <!-- Wax body gradient -->
                <linearGradient id="waxGrad" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%"  stop-color="#fde68a"/>
                  <stop offset="45%" stop-color="#fef3c7"/>
                  <stop offset="100%" stop-color="#d97706"/>
                </linearGradient>
                <!-- Drip gradient (slightly darker) -->
                <linearGradient id="dripGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#fbbf24"/>
                  <stop offset="100%" stop-color="#b45309"/>
                </linearGradient>
                <!-- Flame gradients -->
                <radialGradient id="flameOuter" cx="50%" cy="70%" r="55%">
                  <stop offset="0%"  stop-color="#fef08a"/>
                  <stop offset="45%" stop-color="#f97316"/>
                  <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="flameInner" cx="50%" cy="65%" r="50%">
                  <stop offset="0%"  stop-color="white"/>
                  <stop offset="45%" stop-color="#fde047"/>
                  <stop offset="100%" stop-color="#eab308"/>
                </radialGradient>
                <radialGradient id="flameHalo" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"  stop-color="rgba(251,191,36,0.6)"/>
                  <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
                </radialGradient>
                <!-- Holder gradient -->
                <linearGradient id="holderGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#fbbf24"/>
                  <stop offset="50%" stop-color="#b45309"/>
                  <stop offset="100%" stop-color="#78350f"/>
                </linearGradient>
              </defs>

              <!-- Flame glow halo (subtle ambient light) -->
              ${showFlame ? `
                <ellipse cx="${(150 + flickerSway).toFixed(1)}" cy="${(wickTopY - 18).toFixed(1)}"
                         rx="${(45 * flickerWidth).toFixed(1)}" ry="${(55 * flickerHeight).toFixed(1)}"
                         fill="url(#flameHalo)"/>
              ` : ''}

              <!-- Flame: outer teardrop -->
              ${showFlame ? `
                <path d="M 150,${(wickTopY - 42 * flickerHeight).toFixed(1)}
                         Q ${(160 + flickerSway).toFixed(1)},${(wickTopY - 22).toFixed(1)}
                           ${(150 + flickerSway * 0.6).toFixed(1)},${wickTopY}
                         Q ${(140 + flickerSway).toFixed(1)},${(wickTopY - 22).toFixed(1)}
                           150,${(wickTopY - 42 * flickerHeight).toFixed(1)} Z"
                      fill="url(#flameOuter)"/>
                <!-- Inner flame (brighter) -->
                <path d="M 150,${(wickTopY - 26 * flickerHeight).toFixed(1)}
                         Q ${(155 + flickerSway * 0.8).toFixed(1)},${(wickTopY - 12).toFixed(1)}
                           ${(150 + flickerSway * 0.5).toFixed(1)},${(wickTopY - 2).toFixed(1)}
                         Q ${(145 + flickerSway * 0.8).toFixed(1)},${(wickTopY - 12).toFixed(1)}
                           150,${(wickTopY - 26 * flickerHeight).toFixed(1)} Z"
                      fill="url(#flameInner)"/>
                <!-- Blue hot core at base -->
                <ellipse cx="${(150 + flickerSway * 0.3).toFixed(1)}" cy="${(wickTopY - 4).toFixed(1)}"
                         rx="3.5" ry="5" fill="#60a5fa" opacity="0.7"/>
              ` : ''}

              <!-- Smoke wisp when flame is out -->
              ${showSmoke ? `
                <circle cx="${smokeX.toFixed(1)}" cy="${smokeY.toFixed(1)}" r="${smokeR.toFixed(1)}"
                        fill="#94a3b8" opacity="${smokeOp.toFixed(2)}"/>
                <circle cx="${(smokeX + 4).toFixed(1)}" cy="${(smokeY + 6).toFixed(1)}" r="${(smokeR * 0.7).toFixed(1)}"
                        fill="#cbd5e1" opacity="${(smokeOp * 0.8).toFixed(2)}"/>
              ` : ''}

              <!-- Wick -->
              <line x1="150" y1="${waxTopY.toFixed(1)}" x2="150" y2="${wickTopY.toFixed(1)}"
                    stroke="#1c1917" stroke-width="2.5" stroke-linecap="round"/>
              ${showFlame ? `<circle cx="150" cy="${wickTopY.toFixed(1)}" r="2" fill="#450a0a"/>` : ''}

              <!-- Wax body (tapered: slightly wider at base) -->
              <path d="M 120,${waxTopY.toFixed(1)}
                       Q 110,${(waxTopY + waxH * 0.3).toFixed(1)} 112,400
                       L 188,400
                       Q 190,${(waxTopY + waxH * 0.3).toFixed(1)} 180,${waxTopY.toFixed(1)} Z"
                    fill="url(#waxGrad)" stroke="#b45309" stroke-width="1"/>

              <!-- Wax rim highlight at top -->
              <ellipse cx="150" cy="${waxTopY.toFixed(1)}" rx="30" ry="5" fill="#fbbf24"/>
              <ellipse cx="150" cy="${(waxTopY - 1).toFixed(1)}" rx="24" ry="2.5" fill="#ea580c" opacity="0.3"/>
              <!-- Molten pool around wick -->
              ${showFlame ? `
                <ellipse cx="150" cy="${(waxTopY + 1).toFixed(1)}" rx="14" ry="3" fill="#7c2d12" opacity="0.5"/>
              ` : ''}

              <!-- Wax body highlight (vertical shine line) -->
              <rect x="128" y="${waxTopY.toFixed(1)}" width="4" height="${(waxH - 4).toFixed(1)}"
                    fill="white" opacity="0.25"/>

              <!-- Drips running down the sides -->
              ${showDrips ? `
                <!-- Left drip -->
                <path d="M 114,${(waxTopY + 6).toFixed(1)}
                         Q 109,${(waxTopY + drip1H * 0.3).toFixed(1)} 111,${(waxTopY + drip1H).toFixed(1)}
                         Q 114,${(waxTopY + drip1H + 6).toFixed(1)} 117,${(waxTopY + drip1H).toFixed(1)}
                         Q 119,${(waxTopY + drip1H * 0.3).toFixed(1)} 118,${(waxTopY + 6).toFixed(1)} Z"
                      fill="url(#dripGrad)"/>
                <!-- Right drip -->
                <path d="M 182,${(waxTopY + 10).toFixed(1)}
                         Q 186,${(waxTopY + drip2H * 0.4).toFixed(1)} 184,${(waxTopY + drip2H).toFixed(1)}
                         Q 187,${(waxTopY + drip2H + 5).toFixed(1)} 190,${(waxTopY + drip2H).toFixed(1)}
                         Q 192,${(waxTopY + drip2H * 0.4).toFixed(1)} 188,${(waxTopY + 10).toFixed(1)} Z"
                      fill="url(#dripGrad)"/>
                ${drip3H > 0 ? `
                  <!-- Center-front drip (appears later) -->
                  <path d="M 140,${(waxTopY + 3).toFixed(1)}
                           Q 137,${(waxTopY + drip3H * 0.4).toFixed(1)} 139,${(waxTopY + drip3H).toFixed(1)}
                           Q 142,${(waxTopY + drip3H + 5).toFixed(1)} 145,${(waxTopY + drip3H).toFixed(1)}
                           Q 147,${(waxTopY + drip3H * 0.4).toFixed(1)} 144,${(waxTopY + 3).toFixed(1)} Z"
                        fill="url(#dripGrad)"/>
                ` : ''}
              ` : ''}

              <!-- Candle holder / base -->
              <!-- Holder top (wide rim) -->
              <ellipse cx="150" cy="400" rx="55" ry="10" fill="url(#holderGrad)" stroke="#451a03" stroke-width="1.2"/>
              <ellipse cx="150" cy="398" rx="50" ry="6" fill="#fbbf24" opacity="0.4"/>
              <!-- Stem -->
              <path d="M 135,405 L 125,430 L 175,430 L 165,405 Z" fill="url(#holderGrad)" stroke="#451a03" stroke-width="1"/>
              <!-- Base plate -->
              <ellipse cx="150" cy="435" rx="55" ry="9" fill="url(#holderGrad)" stroke="#451a03" stroke-width="1.2"/>
              <!-- Base shadow on floor -->
              <ellipse cx="150" cy="448" rx="70" ry="5" fill="#000" opacity="0.2"/>
            </svg>
          </div>
          <div class="visual-countdown-overlay" id="visualCountdown">${countdown}</div>
        </div>`;
    }

    function renderRocket(progress, countdown, title) {
      // Inline SVG rocket scene: starfield with twinkling stars, a distant planet,
      // and a classic rocket with tapered nose cone, body stripes, porthole, and
      // triangular fins. The exhaust flame grows and flickers as the rocket rises.
      const t = state.secondsElapsedInBlock || 0;

      // Launch progression — rocket climbs from y=420 (on pad) to y=50 (in space)
      const liftoff = progress > 0.03;
      const rocketY = liftoff ? 420 - (progress * 370) : 420;
      const shake = liftoff && progress < 0.1 ? Math.sin(t * 60) * 2 : 0; // initial liftoff vibration
      const rocketX = 200 + shake;

      // Exhaust: grows during launch, absent at start and at the end
      const showExhaust = liftoff && progress < 0.97;
      const exhaustStretch = 1 + 0.2 * Math.sin(t * 20);
      const exhaustWobble = Math.sin(t * 25) * 4;

      // Milestones: 5-4-3-2-1 countdown in last 10% of block
      const burst = progress >= 1.0;
      let countdownDigit = null;
      if (progress >= 0.9 && progress < 1.0) {
        const phase = (progress - 0.9) / 0.1;
        countdownDigit = Math.max(1, 5 - Math.floor(phase * 5));
      }

      // Star field (deterministic positions; twinkle via time-based opacity)
      let stars = '';
      for (let i = 0; i < 50; i++) {
        const sx = (i * 37 + 13) % 400;
        const sy = (i * 53 + 7) % 470;
        const sr = 0.7 + (i % 4) * 0.4;
        const tw = 0.5 + 0.5 * Math.abs(Math.sin(t * (1 + (i % 5) * 0.3) + i * 0.7));
        stars += `<circle cx="${sx}" cy="${sy}" r="${sr.toFixed(1)}" fill="white" opacity="${tw.toFixed(2)}"/>`;
      }

      // Burst sparkles at 100%
      let burstG = '';
      if (burst) {
        const phase = Math.min(1, ((t % 3) / 1.5));
        for (let i = 0; i < 12; i++) {
          const a = i * 30 * Math.PI / 180;
          const r = phase * 80;
          const bx = 200 + r * Math.cos(a);
