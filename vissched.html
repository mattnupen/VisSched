          const by = 100 + r * Math.sin(a);
          const size = 3 + phase * 4;
          const op = (1 - phase) * 0.9;
          burstG += `<path d="M ${bx.toFixed(1)},${(by - size).toFixed(1)} L ${(bx + size * 0.3).toFixed(1)},${(by - size * 0.3).toFixed(1)} L ${(bx + size).toFixed(1)},${by.toFixed(1)} L ${(bx + size * 0.3).toFixed(1)},${(by + size * 0.3).toFixed(1)} L ${bx.toFixed(1)},${(by + size).toFixed(1)} L ${(bx - size * 0.3).toFixed(1)},${(by + size * 0.3).toFixed(1)} L ${(bx - size).toFixed(1)},${by.toFixed(1)} L ${(bx - size * 0.3).toFixed(1)},${(by - size * 0.3).toFixed(1)} Z" fill="#fde047" opacity="${op.toFixed(2)}"/>`;
        }
      }

      return `
        <div class="visual-timer-container" style="padding:0.5rem 0 0.5rem">
          <div class="visual-timer-header"><h2 class="visual-timer-title">${title}</h2></div>
          <div class="rocket-scene">
            <svg class="rocket-svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="rkSky" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#020617"/>
                  <stop offset="50%" stop-color="#1e1b4b"/>
                  <stop offset="100%" stop-color="#4c1d95"/>
                </linearGradient>
                <linearGradient id="rkBody" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%"  stop-color="#94a3b8"/>
                  <stop offset="50%" stop-color="#f8fafc"/>
                  <stop offset="100%" stop-color="#64748b"/>
                </linearGradient>
                <linearGradient id="rkNose" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%"  stop-color="#b91c1c"/>
                  <stop offset="50%" stop-color="#ef4444"/>
                  <stop offset="100%" stop-color="#7f1d1d"/>
                </linearGradient>
                <linearGradient id="rkFin" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%"  stop-color="#7f1d1d"/>
                  <stop offset="100%" stop-color="#dc2626"/>
                </linearGradient>
                <radialGradient id="rkExhaustOuter" cx="50%" cy="0%" r="80%">
                  <stop offset="0%"  stop-color="#fde047"/>
                  <stop offset="50%" stop-color="#f97316"/>
                  <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="rkExhaustInner" cx="50%" cy="0%" r="70%">
                  <stop offset="0%"  stop-color="white"/>
                  <stop offset="40%" stop-color="#fef08a"/>
                  <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="rkPlanet" cx="30%" cy="30%" r="70%">
                  <stop offset="0%"  stop-color="#bae6fd"/>
                  <stop offset="40%" stop-color="#0284c7"/>
                  <stop offset="100%" stop-color="#0c4a6e"/>
                </radialGradient>
                <radialGradient id="rkWindow" cx="35%" cy="30%" r="65%">
                  <stop offset="0%"  stop-color="#bae6fd"/>
                  <stop offset="100%" stop-color="#1e40af"/>
                </radialGradient>
              </defs>

              <!-- Space background -->
              <rect x="0" y="0" width="400" height="500" fill="url(#rkSky)"/>

              <!-- Stars (with twinkle) -->
              ${stars}

              <!-- Distant planet upper-right -->
              <circle cx="340" cy="90" r="32" fill="url(#rkPlanet)"/>
              <ellipse cx="340" cy="90" rx="48" ry="8" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6" transform="rotate(-20 340 90)"/>

              <!-- Small asteroid -->
              <circle cx="70" cy="140" r="5" fill="#78716c"/>
              <circle cx="72" cy="138" r="1.5" fill="#a8a29e"/>

              <!-- Ground / launchpad (only visible at start) -->
              ${progress < 0.15 ? `
                <rect x="0" y="460" width="400" height="40" fill="#44403c"/>
                <rect x="150" y="450" width="100" height="10" fill="#57534e"/>
                <rect x="170" y="440" width="60"  height="10" fill="#78716c"/>
              ` : ''}

              <!-- 5-4-3-2-1 countdown digit overlay -->
              ${countdownDigit ? `
                <text x="200" y="140" text-anchor="middle" font-family="Impact,sans-serif" font-size="120" font-weight="900" fill="#fde047" stroke="#f59e0b" stroke-width="2" opacity="0.9">${countdownDigit}</text>
              ` : ''}

              <!-- Burst sparkles at 100% -->
              ${burstG}

              <!-- Rocket (hidden at 100% during burst) -->
              ${!burst ? `
                <g transform="translate(${rocketX.toFixed(1)},${rocketY.toFixed(1)})">
                  <!-- Exhaust flame (behind rocket, comes out the bottom) -->
                  ${showExhaust ? `
                    <g transform="translate(0,28) scale(1,${exhaustStretch.toFixed(2)})">
                      <path d="M -16,0 Q ${(-18 + exhaustWobble).toFixed(1)},25 -4,48 Q ${exhaustWobble.toFixed(1)},60 ${(4 + exhaustWobble * 0.5).toFixed(1)},48 Q ${(18 - exhaustWobble).toFixed(1)},25 16,0 Z"
                            fill="url(#rkExhaustOuter)"/>
                      <path d="M -9,0 Q ${(-10 + exhaustWobble * 0.5).toFixed(1)},20 -2,36 Q ${(exhaustWobble * 0.3).toFixed(1)},45 ${(2 + exhaustWobble * 0.3).toFixed(1)},36 Q ${(10 - exhaustWobble * 0.5).toFixed(1)},20 9,0 Z"
                            fill="url(#rkExhaustInner)"/>
                      <!-- Embers -->
                      <circle cx="${(-6 + exhaustWobble).toFixed(1)}" cy="${(40 + ((t * 40) % 15)).toFixed(1)}" r="1.5" fill="#fde047" opacity="0.8"/>
                      <circle cx="${(5 + exhaustWobble * 0.5).toFixed(1)}" cy="${(50 + ((t * 30) % 20)).toFixed(1)}" r="1.2" fill="#f97316" opacity="0.7"/>
                    </g>
                  ` : ''}

                  <!-- Fins (triangular, slightly behind body) -->
                  <path d="M -12,10 L -28,32 L -12,32 Z" fill="url(#rkFin)" stroke="#450a0a" stroke-width="1"/>
                  <path d="M 12,10  L 28,32  L 12,32 Z" fill="url(#rkFin)" stroke="#450a0a" stroke-width="1"/>
                  <path d="M 0,5   L 0,32   L -4,32 L 0,10 L 4,32 L 0,32 Z" fill="#b91c1c" opacity="0.8"/>

                  <!-- Body (cylindrical with side shading) -->
                  <rect x="-14" y="-30" width="28" height="60" fill="url(#rkBody)" stroke="#334155" stroke-width="1"/>
                  <!-- Body stripes -->
                  <rect x="-14" y="-12" width="28" height="3" fill="#dc2626"/>
                  <rect x="-14" y="12"  width="28" height="3" fill="#dc2626"/>
                  <!-- USA / flag marking -->
                  <rect x="-6" y="-4" width="12" height="8" fill="#1e40af"/>
                  <rect x="-6" y="-2" width="12" height="1.5" fill="white"/>
                  <rect x="-6" y="0.5" width="12" height="1.5" fill="white"/>
                  <rect x="-6" y="-4" width="5" height="4" fill="#1e3a8a"/>

                  <!-- Porthole window -->
                  <circle cx="0" cy="-20" r="6" fill="url(#rkWindow)" stroke="#334155" stroke-width="1.5"/>
                  <circle cx="-2" cy="-22" r="2" fill="white" opacity="0.7"/>
                  <!-- Rivets -->
                  <circle cx="-10" cy="-26" r="1" fill="#475569"/>
                  <circle cx="10"  cy="-26" r="1" fill="#475569"/>
                  <circle cx="-10" cy="26"  r="1" fill="#475569"/>
                  <circle cx="10"  cy="26"  r="1" fill="#475569"/>

                  <!-- Nose cone -->
                  <path d="M -14,-30 L 0,-60 L 14,-30 Z" fill="url(#rkNose)" stroke="#450a0a" stroke-width="1.5"/>
                  <!-- Nose highlight -->
                  <path d="M -10,-30 L -2,-55 L -4,-30 Z" fill="white" opacity="0.3"/>
                  <!-- Nose tip -->
                  <circle cx="0" cy="-60" r="2" fill="#fde047"/>
                </g>
              ` : ''}
            </svg>
          </div>
          <div class="visual-countdown-overlay" id="visualCountdown">${countdown}</div>
        </div>`;
    }

    function renderWater(progress, countdown, title) {
      // Inline SVG glass of water: real glass silhouette with thickness and
      // reflections, condensation droplets, a wavy water surface, rising
      // bubbles, ice cubes, and milestone sea creatures.
      const t = state.secondsElapsedInBlock || 0;

      // Water level in viewBox coords. Glass interior: y=80 (rim) to y=420 (base).
      const glassTopY = 80;
      const glassBotY = 420;
      const waterH = (glassBotY - glassTopY) * progress;
      const waterTopY = glassBotY - waterH;

      // Surface wave: subtle sine undulation
      const waveOffset = Math.sin(t * 2) * 2;

      // Bubbles rising from the bottom (only when there's some water)
      let bubbles = '';
      if (progress > 0.05) {
        const BUBS = [
          { x: 130, speed: 25, phase: 0,   size: 3 },
          { x: 170, speed: 20, phase: 2.2, size: 2 },
          { x: 230, speed: 30, phase: 1.1, size: 3.5 },
          { x: 270, speed: 22, phase: 3.3, size: 2.5 },
          { x: 200, speed: 18, phase: 4.0, size: 2 },
        ];
        for (const b of BUBS) {
          const climb = ((t * b.speed + b.phase * 40) % waterH);
          const by = glassBotY - 5 - climb;
          if (by > waterTopY + 5) {
            const sway = Math.sin(t * 2 + b.phase) * 2;
            bubbles += `<circle cx="${(b.x + sway).toFixed(1)}" cy="${by.toFixed(1)}" r="${b.size}"
                        fill="rgba(186,230,253,0.5)" stroke="rgba(255,255,255,0.9)" stroke-width="0.8"/>`;
            bubbles += `<circle cx="${(b.x + sway - b.size * 0.3).toFixed(1)}" cy="${(by - b.size * 0.3).toFixed(1)}"
                        r="${(b.size * 0.3).toFixed(1)}" fill="white" opacity="0.8"/>`;
          }
        }
      }

      // Condensation droplets on outside of glass (always some, more as water fills)
      let drops = '';
      const dropCount = Math.floor(8 + progress * 10);
      for (let i = 0; i < dropCount; i++) {
        const dx = 120 + ((i * 43 + 7) % 170);
        const dy = glassTopY + 20 + ((i * 37 + 13) % (glassBotY - glassTopY - 30));
        const dr = 1.5 + (i % 3) * 0.5;
        drops += `<circle cx="${dx}" cy="${dy}" r="${dr}" fill="rgba(255,255,255,0.7)" stroke="rgba(186,230,253,0.9)" stroke-width="0.5"/>`;
      }

      // Ice cubes floating on the surface (show once water is high enough)
      let ice = '';
      if (progress > 0.25) {
        const iceSway = Math.sin(t * 1.2) * 3;
        const ice2Sway = Math.sin(t * 1.5 + 2) * 2.5;
        ice = `
          <g transform="translate(${(170 + iceSway).toFixed(1)},${(waterTopY - 2).toFixed(1)}) rotate(${(iceSway * 2).toFixed(1)})">
            <rect x="-14" y="-12" width="28" height="24" rx="3" fill="rgba(224,242,254,0.85)" stroke="rgba(186,230,253,0.9)" stroke-width="1"/>
            <rect x="-11" y="-9" width="8" height="6" fill="white" opacity="0.6"/>
            <line x1="-11" y1="5" x2="-5" y2="9" stroke="white" stroke-width="0.8" opacity="0.5"/>
          </g>
          ${progress > 0.5 ? `
            <g transform="translate(${(230 + ice2Sway).toFixed(1)},${(waterTopY - 1).toFixed(1)}) rotate(${(-ice2Sway * 2.5).toFixed(1)})">
              <rect x="-12" y="-10" width="24" height="20" rx="3" fill="rgba(224,242,254,0.8)" stroke="rgba(186,230,253,0.9)" stroke-width="1"/>
              <rect x="-9" y="-7" width="6" height="5" fill="white" opacity="0.6"/>
            </g>
          ` : ''}`;
      }

      // Milestones
      const showFish = progress >= 0.25 && progress < 0.5;
      const showDuck = progress >= 0.5;
      const showSparkle = progress >= 1.0;

      let fishG = '';
      if (showFish) {
        const fx = 150 + ((t * 40) % 100);
        const fy = waterTopY + (glassBotY - waterTopY) * 0.5;
        const facing = ((t * 40) % 200 > 100) ? -1 : 1;
        const flap = 12 * Math.sin(t * 8);
        fishG = `
          <g transform="translate(${fx.toFixed(1)},${fy.toFixed(1)}) scale(${facing * 0.6},0.6)">
            <g transform="translate(-14,0) skewX(${flap.toFixed(1)})">
              <path d="M 0,0 L -10,-7 L -7,0 L -10,7 Z" fill="#f97316"/>
            </g>
            <ellipse cx="0" cy="0" rx="14" ry="7" fill="#fb923c"/>
            <ellipse cx="-2" cy="-2" rx="8" ry="3" fill="#fdba74" opacity="0.7"/>
            <circle cx="8" cy="-2" r="1.8" fill="white"/>
            <circle cx="8.5" cy="-2" r="1.1" fill="#1c1917"/>
          </g>`;
      }

      let duckG = '';
      if (showDuck) {
        const dx = 200 + Math.sin(t * 0.6) * 40;
        const dy = waterTopY - 12;
        const qFlap = Math.sin(t * 5) * 6;
        duckG = `
          <g transform="translate(${dx.toFixed(1)},${dy.toFixed(1)})">
            <!-- Body (rounded) -->
            <ellipse cx="0" cy="0" rx="22" ry="14" fill="#fde047"/>
            <ellipse cx="-3" cy="-3" rx="12" ry="6" fill="#fef08a" opacity="0.8"/>
            <!-- Tail -->
            <path d="M -20,0 L -28,-4 L -22,4 Z" fill="#facc15"/>
            <!-- Neck + head -->
            <ellipse cx="15" cy="-14" rx="10" ry="9" fill="#fde047"/>
            <!-- Eye -->
            <circle cx="18" cy="-16" r="2" fill="white"/>
            <circle cx="18.4" cy="-16" r="1.2" fill="#1c1917"/>
            <!-- Beak -->
            <path d="M 23,-13 L 30,-12 L 30,-10 L 23,-11 Z" fill="#f97316"/>
            <!-- Wing with small flap -->
            <g transform="rotate(${qFlap.toFixed(1)} -4 -4)">
              <path d="M -4,-4 Q 4,-10 12,-4 Q 6,4 -4,-4 Z" fill="#eab308"/>
            </g>
            <!-- Water ripple under duck -->
            <ellipse cx="0" cy="14" rx="24" ry="3" fill="none" stroke="#bae6fd" stroke-width="0.8" opacity="0.6"/>
            <ellipse cx="0" cy="16" rx="30" ry="2" fill="none" stroke="#bae6fd" stroke-width="0.6" opacity="0.4"/>
          </g>`;
      }

      return `
        <div class="visual-timer-container" style="padding:0.5rem 0 0.5rem">
          <div class="visual-timer-header"><h2 class="visual-timer-title">${title}</h2></div>
          <div class="water-scene">
            <svg class="water-svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="wtGlass" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%"   stop-color="rgba(186,230,253,0.6)"/>
                  <stop offset="50%"  stop-color="rgba(224,242,254,0.2)"/>
                  <stop offset="100%" stop-color="rgba(186,230,253,0.6)"/>
                </linearGradient>
                <linearGradient id="wtWater" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#60a5fa"/>
                  <stop offset="50%" stop-color="#2563eb"/>
                  <stop offset="100%" stop-color="#1e3a8a"/>
                </linearGradient>
                <clipPath id="wtGlassClip">
                  <!-- Inner glass silhouette (tapered tumbler) -->
                  <path d="M 118,80 L 282,80 Q 285,250 275,420 L 125,420 Q 115,250 118,80 Z"/>
                </clipPath>
              </defs>

              <!-- Coaster / table -->
              <ellipse cx="200" cy="440" rx="110" ry="14" fill="#44403c" opacity="0.8"/>
              <ellipse cx="200" cy="443" rx="105" ry="8" fill="#78716c"/>

              <!-- Glass outer silhouette (slightly wider than inner to show thickness) -->
              <path d="M 110,70 L 290,70 Q 293,250 283,430 L 117,430 Q 107,250 110,70 Z"
                    fill="url(#wtGlass)" stroke="#93c5fd" stroke-width="1.5"/>

              <!-- Rim -->
              <ellipse cx="200" cy="70" rx="90" ry="10" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1.5"/>
              <ellipse cx="200" cy="70" rx="80" ry="6" fill="#bae6fd" opacity="0.7"/>

              <!-- Base -->
              <ellipse cx="200" cy="430" rx="83" ry="8" fill="#bae6fd" opacity="0.7"/>
              <ellipse cx="200" cy="432" rx="88" ry="4" fill="#93c5fd"/>

              <!-- Water inside glass (clipped to interior) -->
              <g clip-path="url(#wtGlassClip)">
                <rect x="115" y="${waterTopY.toFixed(1)}" width="170" height="${waterH.toFixed(1)}" fill="url(#wtWater)"/>
                <!-- Wavy water surface -->
                <path d="M 115,${waterTopY.toFixed(1)}
                         Q ${(150 + waveOffset).toFixed(1)},${(waterTopY - 3).toFixed(1)}
                           ${(185 + waveOffset).toFixed(1)},${waterTopY.toFixed(1)}
                         T 285,${waterTopY.toFixed(1)} L 285,${(waterTopY + 8).toFixed(1)} L 115,${(waterTopY + 8).toFixed(1)} Z"
                      fill="#60a5fa" opacity="0.7"/>
                <!-- Surface highlight ellipse -->
                <ellipse cx="200" cy="${(waterTopY + 1).toFixed(1)}" rx="80" ry="3" fill="white" opacity="0.4"/>

                <!-- Ice cubes -->
                ${ice}

                <!-- Milestone creatures -->
                ${fishG}
                ${duckG}

                <!-- Bubbles -->
                ${bubbles}

                <!-- Surface sparkle at 100% -->
                ${showSparkle ? `
                  <g transform="translate(${(200 + Math.sin(t * 3) * 30).toFixed(1)},${(waterTopY - 4).toFixed(1)})">
                    <path d="M 0,-8 L 2,-2 L 8,0 L 2,2 L 0,8 L -2,2 L -8,0 L -2,-2 Z" fill="#fde047"/>
                    <circle cx="0" cy="0" r="2" fill="white"/>
                  </g>
                ` : ''}
              </g>

              <!-- Glass left highlight (outside glass surface reflection) -->
              <path d="M 118,85 Q 114,250 122,420" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
              <path d="M 122,90 Q 118,200 126,380" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

              <!-- Glass right highlight (subtle) -->
              <path d="M 278,100 Q 282,250 274,400" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>

              <!-- Condensation drops on outside (after clip, drawn on top) -->
              ${drops}

              <!-- Straw -->
              <rect x="215" y="40" width="7" height="${(waterTopY - 40 + 10).toFixed(1)}" fill="#f43f5e"
                    transform="rotate(12 218 ${((waterTopY + 40) / 2).toFixed(1)})"/>
              <rect x="215" y="40" width="3" height="${(waterTopY - 40 + 10).toFixed(1)}" fill="#fb7185" opacity="0.7"
                    transform="rotate(12 218 ${((waterTopY + 40) / 2).toFixed(1)})"/>
              <!-- Straw stripe -->
              <rect x="215" y="50" width="7" height="4" fill="white"
                    transform="rotate(12 218 52)"/>
            </svg>
          </div>
          <div class="visual-countdown-overlay" id="visualCountdown">${countdown}</div>
        </div>`;
    }

    function renderAquarium(progress, countdown, title) {
      // Inline SVG aquarium. Everything is deterministic from elapsed-in-block time
      // so animations stay smooth through 100ms re-renders (no CSS/SMIL resets).
      const t = state.secondsElapsedInBlock || 0;

      // ---------- Fish configurations ----------
      // Each fish is a distinct species with unique colors, scale, flap rate, and swim path.
      const FISH = [
        // Clownfish
        { body:'#ea580c', stripe:'#ffffff', tail:'#c2410c', fin:'#9a3412', stripes:true,
          scale:1.0, flap:8, yBase:120, yAmp:25, speed:0.30, phase:0.0 },
        // Blue Tang (Dory-style)
        { body:'#2563eb', stripe:null, tail:'#fde047', fin:'#1e40af', stripes:false,
          scale:1.15, flap:7, yBase:180, yAmp:35, speed:0.24, phase:1.8 },
        // Butterflyfish
        { body:'#facc15', stripe:'#1c1917', tail:'#eab308', fin:'#ca8a04', stripes:true,
          scale:0.9, flap:9, yBase:240, yAmp:28, speed:0.35, phase:3.4 },
        // Royal Gramma (purple/gold)
        { body:'#a855f7', stripe:null, tail:'#fbbf24', fin:'#7c3aed', stripes:false,
          scale:1.1, flap:6, yBase:300, yAmp:22, speed:0.28, phase:5.0 },
        // Neon Tetra (cyan/magenta)
        { body:'#06b6d4', stripe:'#f43f5e', tail:'#0e7490', fin:'#0891b2', stripes:true,
          scale:0.7, flap:10, yBase:360, yAmp:35, speed:0.42, phase:6.6 },
        // Koi
        { body:'#fb923c', stripe:'#fff7ed', tail:'#ea580c', fin:'#c2410c', stripes:true,
          scale:1.3, flap:6, yBase:410, yAmp:20, speed:0.26, phase:8.2 },
        // Pufferfish (round + spiky)
        { body:'#fcd34d', stripe:null, tail:'#f59e0b', fin:'#d97706', stripes:false,
          scale:0.95, flap:8, yBase:460, yAmp:18, speed:0.38, phase:9.9, puffer:true },
        // Tropical pink
        { body:'#ec4899', stripe:'#fce7f3', tail:'#be185d', fin:'#9d174d', stripes:true,
          scale:0.85, flap:9, yBase:510, yAmp:12, speed:0.26, phase:11.5 },
      ];

      // How many fish are currently visible (grows with progress)
      const visibleFish = Math.min(FISH.length, Math.floor(progress * FISH.length * 1.05));

      // Render one fish at its computed position
      function fishSvg(cfg) {
        const phase = t * cfg.speed + cfg.phase;
        const x = 200 + 170 * Math.sin(phase);
        const y = cfg.yBase + cfg.yAmp * Math.sin(phase * 0.7 + cfg.phase);
        // Facing direction follows horizontal velocity (derivative of sin is cos)
        const facing = Math.cos(phase) >= 0 ? 1 : -1;
        // Tail skew sweeps side-to-side (natural for a side-viewed fish)
        const tailSkew = 12 * Math.sin(t * cfg.flap);
        // Body bob (tiny up/down from tail flap reaction)
        const bob = 1.5 * Math.cos(t * cfg.flap + 0.5);

        // Pufferfish: round body with spikes; others: ellipse body
        let body, fins, eyeX, mouthX;
        if (cfg.puffer) {
          let spikes = '';
          for (let i = 0; i < 14; i++) {
            const a = i * (360 / 14) * Math.PI / 180;
            const x1 = 14 * Math.cos(a), y1 = 14 * Math.sin(a);
            const x2 = 19 * Math.cos(a), y2 = 19 * Math.sin(a);
            spikes += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${cfg.fin}" stroke-width="1.5" stroke-linecap="round"/>`;
          }
          body = spikes + `<circle cx="0" cy="0" r="14" fill="${cfg.body}"/>`
                       + `<ellipse cx="-3" cy="-4" rx="6" ry="3" fill="white" opacity="0.25"/>`;
          fins = '';
          eyeX = 8; mouthX = 12;
        } else {
          body = `<ellipse cx="0" cy="0" rx="20" ry="11" fill="${cfg.body}"/>`
               + `<ellipse cx="-3" cy="-4" rx="10" ry="4" fill="white" opacity="0.2"/>`;
          fins = `<path d="M -3,-10 L 2,-18 L 10,-10 Z" fill="${cfg.fin}"/>`
               + `<path d="M 0,10 L 5,16 L 11,10 Z" fill="${cfg.fin}"/>`;
          eyeX = 11; mouthX = 17;
        }

        const stripes = cfg.stripes
          ? `<rect x="-5" y="-11" width="3" height="22" fill="${cfg.stripe}" opacity="0.9"/>
             <rect x="4" y="-11" width="3" height="22" fill="${cfg.stripe}" opacity="0.9"/>`
          : '';

        const tailRootX = cfg.puffer ? -10 : -20;
        return `
          <g transform="translate(${x.toFixed(1)},${(y + bob).toFixed(1)}) scale(${(facing * cfg.scale).toFixed(2)},${cfg.scale.toFixed(2)})">
            <g transform="translate(${tailRootX},0) skewX(${tailSkew.toFixed(1)})">
              <path d="M 0,0 L -14,-10 L -9,0 L -14,10 Z" fill="${cfg.tail}"/>
              <path d="M -9,0 L -14,-8 L -14,8 Z" fill="${cfg.fin}" opacity="0.6"/>
            </g>
            ${fins}
            ${body}
            ${stripes}
            <circle cx="${eyeX}" cy="-3" r="2.5" fill="white"/>
            <circle cx="${eyeX + 1}" cy="-3" r="1.5" fill="#1c1917"/>
            <circle cx="${eyeX + 1.3}" cy="-3.3" r="0.5" fill="white"/>
            <path d="M ${mouthX},1 Q ${mouthX + 2},2 ${mouthX + 1},3" fill="none" stroke="#1c1917" stroke-width="0.8"/>
          </g>`;
      }

      let fishHTML = '';
      for (let i = 0; i < visibleFish; i++) fishHTML += fishSvg(FISH[i]);

      // ---------- Bubbles: continuously rise from the tank floor ----------
      const BUBBLES = [
        { x: 70,  speed: 55, size: 5, phase: 0.0 },
        { x: 140, speed: 45, size: 3, phase: 2.1 },
        { x: 200, speed: 60, size: 6, phase: 4.2 },
        { x: 260, speed: 42, size: 4, phase: 1.1 },
        { x: 320, speed: 50, size: 5, phase: 3.3 },
        { x: 90,  speed: 48, size: 3, phase: 5.4 },
        { x: 370, speed: 52, size: 4, phase: 2.7 },
      ];
      let bubblesHTML = '';
      for (const b of BUBBLES) {
        const rise = (t * b.speed + b.phase * 100) % 600;
        const y = 580 - rise;
        const sway = Math.sin(t * 1.5 + b.phase) * 4;
        const opacity = y < 40 ? Math.max(0, y / 40) : (y > 550 ? 0.5 : 0.85);
        const cx = (b.x + sway).toFixed(1);
        bubblesHTML += `<circle cx="${cx}" cy="${y.toFixed(1)}" r="${b.size}" fill="rgba(186,230,253,0.4)" stroke="rgba(255,255,255,0.85)" stroke-width="0.9" opacity="${opacity.toFixed(2)}"/>`;
        bubblesHTML += `<circle cx="${(b.x + sway - b.size * 0.35).toFixed(1)}" cy="${(y - b.size * 0.35).toFixed(1)}" r="${(b.size * 0.3).toFixed(1)}" fill="rgba(255,255,255,0.95)" opacity="${(opacity * 0.7).toFixed(2)}"/>`;
      }

      // ---------- Seaweed (swaying quadratic paths) ----------
      const SEAWEEDS = [
        { x: 55,  height: 170, phase: 0,   color1:'#14532d', color2:'#16a34a' },
        { x: 115, height: 130, phase: 1.5, color1:'#14532d', color2:'#22c55e' },
        { x: 290, height: 150, phase: 3.0, color1:'#166534', color2:'#22c55e' },
        { x: 350, height: 185, phase: 4.5, color1:'#14532d', color2:'#16a34a' },
      ];
      let seaweedHTML = '';
      for (const s of SEAWEEDS) {
        const sway = Math.sin(t * 0.9 + s.phase) * 18;
        const topY = 580 - s.height;
        const midY = (580 + topY) / 2;
        seaweedHTML += `
          <path d="M ${s.x},580 Q ${(s.x + sway).toFixed(1)},${midY} ${(s.x + sway * 0.35).toFixed(1)},${topY}"
                fill="none" stroke="${s.color1}" stroke-width="9" stroke-linecap="round" opacity="0.75"/>
          <path d="M ${s.x},580 Q ${(s.x + sway).toFixed(1)},${midY} ${(s.x + sway * 0.35).toFixed(1)},${topY}"
                fill="none" stroke="${s.color2}" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
        `;
      }

      // ---------- Coral (static branched shapes) ----------
      const coralHTML = `
        <g transform="translate(200,580)">
          <path d="M 0,0 L -3,-22 L -9,-32 M -3,-22 L 3,-38 L -2,-52 M 3,-38 L 9,-42"
                fill="none" stroke="#f43f5e" stroke-width="7" stroke-linecap="round"/>
          <path d="M 0,0 L 6,-20 L 11,-30 M 6,-20 L 13,-32"
                fill="none" stroke="#fb7185" stroke-width="4.5" stroke-linecap="round"/>
          <path d="M -6,0 L -8,-14 L -14,-22"
                fill="none" stroke="#be123c" stroke-width="3" stroke-linecap="round"/>
        </g>
        <g transform="translate(235,580)">
          <path d="M 0,0 L 3,-28 L -4,-42 M 3,-28 L 12,-34"
                fill="none" stroke="#fb923c" stroke-width="5.5" stroke-linecap="round"/>
          <path d="M 0,0 L -4,-22 L 5,-38"
                fill="none" stroke="#f97316" stroke-width="3.5" stroke-linecap="round"/>
        </g>`;

      // ---------- Rocks on the sand ----------
      const rocksHTML = `
        <ellipse cx="45"  cy="585" rx="38" ry="11" fill="#57534e"/>
        <ellipse cx="45"  cy="582" rx="32" ry="6"  fill="#78716c"/>
        <ellipse cx="190" cy="588" rx="48" ry="9"  fill="#44403c"/>
        <ellipse cx="185" cy="585" rx="20" ry="6"  fill="#57534e"/>
        <ellipse cx="370" cy="584" rx="32" ry="12" fill="#57534e"/>
        <ellipse cx="365" cy="580" rx="18" ry="7"  fill="#78716c"/>
      `;

      // ---------- Caustic light rays (shift slowly) ----------
      const off = (t * 8) % 100;
      const causticHTML = `
        <g opacity="0.28">
          <path d="M ${(20 + off * 0.25).toFixed(1)},0 L ${(60 + off * 0.25).toFixed(1)},620 L ${(95 + off * 0.25).toFixed(1)},620 L ${(55 + off * 0.25).toFixed(1)},0 Z" fill="url(#causticGrad)"/>
          <path d="M ${(160 + off * 0.2).toFixed(1)},0 L ${(210 + off * 0.2).toFixed(1)},620 L ${(240 + off * 0.2).toFixed(1)},620 L ${(190 + off * 0.2).toFixed(1)},0 Z" fill="url(#causticGrad)"/>
          <path d="M ${(300 + off * 0.22).toFixed(1)},0 L ${(350 + off * 0.22).toFixed(1)},620 L ${(380 + off * 0.22).toFixed(1)},620 L ${(330 + off * 0.22).toFixed(1)},0 Z" fill="url(#causticGrad)"/>
        </g>`;

      // ---------- Milestones ----------
      // 50% — a small school of tiny fish passes from left to right once
      const showSchool = progress >= 0.48 && progress < 0.62;
      let schoolHTML = '';
      if (showSchool) {
        const sp = (progress - 0.48) / 0.14; // 0 → 1 during the window
        const sx = -60 + sp * 520;
        const flap = 12 * Math.sin(t * 14);
        for (let i = 0; i < 5; i++) {
          const dx = (i - 2) * 18;
          const dy = Math.abs(i - 2) * 6;
          schoolHTML += `
            <g transform="translate(${(sx + dx).toFixed(1)},${280 + dy}) scale(0.5)">
              <g transform="translate(-18,0) skewX(${flap.toFixed(1)})">
                <path d="M 0,0 L -14,-9 L -9,0 L -14,9 Z" fill="#64748b"/>
              </g>
              <ellipse cx="0" cy="0" rx="18" ry="7" fill="#cbd5e1"/>
              <ellipse cx="-3" cy="-3" rx="9" ry="3" fill="white" opacity="0.3"/>
              <circle cx="10" cy="-2" r="2" fill="white"/>
              <circle cx="11" cy="-2" r="1.1" fill="#1e293b"/>
            </g>`;
        }
      }

      // 100% — dolphin arcs through the tank with tail flukes flapping
      const showDolphin = progress >= 0.95;
      let dolphinHTML = '';
      if (showDolphin) {
        const dp = Math.min(1, (progress - 0.95) / 0.05);
        const dx = -100 + dp * 600;
        const dy = 220 - Math.sin(dp * Math.PI) * 90; // arc up & down
        const dflap = 8 * Math.sin(t * 6);
        dolphinHTML = `
          <g transform="translate(${dx.toFixed(1)},${dy.toFixed(1)})">
            <g transform="translate(-48,0) skewY(${dflap.toFixed(1)})">
              <path d="M 0,0 L -22,-20 L -14,0 L -22,20 Z" fill="#64748b"/>
              <path d="M -14,0 L -22,-15 L -22,15 Z" fill="#475569"/>
            </g>
            <ellipse cx="0" cy="0" rx="48" ry="16" fill="#94a3b8"/>
            <path d="M -40,0 Q 0,12 40,2 L 40,14 Q 0,20 -40,12 Z" fill="#cbd5e1"/>
            <path d="M -10,-14 L -2,-28 L 12,-14 Z" fill="#64748b"/>
            <path d="M -14,8 L -4,20 L 6,10 Z" fill="#64748b"/>
            <path d="M 30,-4 Q 48,-3 52,0 Q 48,6 30,7 Z" fill="#94a3b8"/>
            <circle cx="20" cy="-5" r="3" fill="white"/>
            <circle cx="21" cy="-5" r="1.8" fill="#1e293b"/>
            <circle cx="21.5" cy="-5.5" r="0.6" fill="white"/>
            <path d="M 32,4 Q 42,7 48,3" fill="none" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
            <circle cx="-6" cy="-13" r="1.8" fill="white" opacity="0.8"/>
            <circle cx="-2" cy="-16" r="1" fill="white" opacity="0.7"/>
          </g>`;
      }

      // ---------- Sand texture dots (deterministic) ----------
      let sandDots = '';
      for (let i = 0; i < 50; i++) {
        const x = (i * 37 + 13) % 400;
        const y = 580 + (i * 53 + 7) % 40;
        const r = 0.4 + (i % 4) * 0.25;
        sandDots += `<circle cx="${x}" cy="${y}" r="${r.toFixed(1)}" fill="#78350f" opacity="0.45"/>`;
      }

      return `
        <div class="visual-timer-container" style="padding:0.5rem 0 0.5rem">
          <div class="visual-timer-header"><h2 class="visual-timer-title">${title}</h2></div>
          <div class="aquarium-scene">
            <svg class="aquarium-svg" viewBox="0 0 400 620" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"   stop-color="#7dd3fc"/>
                  <stop offset="35%"  stop-color="#38bdf8"/>
                  <stop offset="75%"  stop-color="#0369a1"/>
                  <stop offset="100%" stop-color="#0c4a6e"/>
                </linearGradient>
                <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#fbbf24"/>
                  <stop offset="40%" stop-color="#d4a574"/>
                  <stop offset="100%" stop-color="#92400e"/>
                </linearGradient>
                <linearGradient id="causticGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="rgba(255,255,255,0.55)"/>
                  <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                </linearGradient>
                <radialGradient id="surfaceGrad" cx="50%" cy="0%" r="70%">
                  <stop offset="0%"  stop-color="rgba(255,255,255,0.4)"/>
                  <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                </radialGradient>
              </defs>

              <!-- Water column & sand are provided by CSS gradient on the scene
                   container so they extend to the full container width/height.
                   Only surface shimmer, caustic rays, and sand texture stay in SVG. -->

              <!-- Surface shimmer (near the top) -->
              <rect x="0" y="0" width="400" height="80" fill="url(#surfaceGrad)"/>

              <!-- Caustic light rays -->
              ${causticHTML}

              <!-- Sand texture (sits on top of CSS sand band) -->
              ${sandDots}

              <!-- Rocks -->
              ${rocksHTML}

              <!-- Seaweed (behind fish) -->
              ${seaweedHTML}

              <!-- Coral -->
              ${coralHTML}

              <!-- Fish -->
              ${fishHTML}

              <!-- Milestones -->
              ${schoolHTML}
              ${dolphinHTML}

              <!-- Bubbles in front of everything -->
              ${bubblesHTML}
            </svg>
          </div>
          <div class="visual-countdown-overlay" id="visualCountdown">${countdown}</div>
        </div>`;
    }

    function renderTrain(progress, countdown, title) {
      // Inline SVG steam locomotive: wheels rotate based on travel distance,
      // side rod oscillates, smokestack puffs continuously, clouds drift, and
      // the train arrives at a proper station building at 100%.
      const t = state.secondsElapsedInBlock || 0;

      // Train base position — x in viewBox coords (0..800). Starts at 60, ends at 540.
      const trainX = 60 + progress * 480;
      const arrived = progress >= 1.0;
      const showCrossing = progress >= 0.74 && progress < 0.82;

      // Wheel rotation: angle = distance_traveled / wheel_radius (in radians, then degrees)
      // Use middle (big) wheel as reference since its r drives the rotation math
      const bigR = 14;
      const wheelAngle = ((progress * 480) / bigR) * (180 / Math.PI);

      // Side rod pivot offset (circular motion traced by the rod pin)
      const sideRodDx = bigR * 0.65 * Math.cos(wheelAngle * Math.PI / 180);
      const sideRodDy = bigR * 0.65 * Math.sin(wheelAngle * Math.PI / 180);

      // ---------- Wheel renderer (with spokes) ----------
      function wheel(cx, cy, r, angle) {
        let spokes = '';
        for (let i = 0; i < 6; i++) {
          const a = (i * 60 + angle) * Math.PI / 180;
          const ex = cx + r * 0.82 * Math.cos(a);
          const ey = cy + r * 0.82 * Math.sin(a);
          spokes += `<line x1="${cx}" y1="${cy}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#fde047" stroke-width="${(r * 0.15).toFixed(1)}" stroke-linecap="round"/>`;
        }
        return `
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="#7f1d1d" stroke="#450a0a" stroke-width="2"/>
          <circle cx="${cx}" cy="${cy}" r="${r * 0.9}" fill="#991b1b"/>
          ${spokes}
          <circle cx="${cx}" cy="${cy}" r="${r * 0.25}" fill="#1c1917"/>
          <circle cx="${cx - r * 0.1}" cy="${cy - r * 0.1}" r="${r * 0.1}" fill="#fbbf24"/>
        `;
      }

      // ---------- Smoke puffs (staggered life cycles trailing the train) ----------
      const smokestackScreenX = trainX + 68; // world-coord smokestack position
      const smokestackY = 215;
      let smokeHTML = '';
      const NUM_PUFFS = 6;
      for (let i = 0; i < NUM_PUFFS; i++) {
        const cycle = 2.2; // seconds per puff life
        const age = ((t + i * (cycle / NUM_PUFFS)) % cycle) / cycle; // 0..1
        // Puffs drift up and slightly back (train is moving forward)
        const px = smokestackScreenX - age * 30 + (i % 2 === 0 ? -2 : 2);
        const py = smokestackY - age * 75;
        const pSize = 6 + age * 16;
        const pOp = (1 - age) * 0.85;
        if (pOp <= 0.05) continue;
        // Cloud-like puff: main circle + two smaller lumps to make it "billowy"
        smokeHTML += `
          <g opacity="${pOp.toFixed(2)}">
            <circle cx="${px.toFixed(1)}"       cy="${py.toFixed(1)}"       r="${pSize.toFixed(1)}" fill="#e2e8f0"/>
            <circle cx="${(px - pSize*0.5).toFixed(1)}" cy="${(py + pSize*0.2).toFixed(1)}" r="${(pSize*0.7).toFixed(1)}" fill="#cbd5e1"/>
            <circle cx="${(px + pSize*0.4).toFixed(1)}" cy="${(py - pSize*0.1).toFixed(1)}" r="${(pSize*0.65).toFixed(1)}" fill="#f1f5f9"/>
          </g>`;
      }

      // ---------- Clouds (drifting in sky) ----------
      const cloudOffset = (t * 8) % 900;
      function skyCloud(baseX, y, scale) {
        const x = ((baseX + cloudOffset) % 900) - 100;
        return `
          <g transform="translate(${x.toFixed(1)},${y}) scale(${scale})" opacity="0.9">
            <ellipse cx="0"   cy="0"   rx="26" ry="14" fill="white"/>
            <ellipse cx="22"  cy="-8"  rx="24" ry="17" fill="white"/>
            <ellipse cx="46"  cy="-4"  rx="22" ry="14" fill="#f8fafc"/>
            <ellipse cx="66"  cy="3"   rx="16" ry="10" fill="white"/>
            <ellipse cx="30"  cy="6"   rx="28" ry="8"  fill="#f1f5f9"/>
          </g>`;
      }

      // ---------- Trees (distant + foreground) ----------
      function distantTree(x, y, scale, tint) {
        return `
          <g transform="translate(${x},${y}) scale(${scale})" opacity="0.75">
            <rect x="-2" y="-3" width="4" height="14" fill="#78350f"/>
            <polygon points="0,-30 -14,-8 14,-8" fill="${tint}"/>
            <polygon points="0,-20 -12,0 12,0" fill="${tint}"/>
          </g>`;
      }

      // ---------- Station building ----------
      const stationCelebrate = arrived ? 1.08 + 0.03 * Math.sin(t * 6) : 1;
      const stationGroup = `
        <g transform="translate(680,300) scale(${stationCelebrate.toFixed(2)})">
          <!-- Platform -->
          <rect x="-60" y="30" width="140" height="12" fill="#78716c"/>
          <rect x="-60" y="30" width="140" height="3"  fill="#a8a29e"/>
          <!-- Building body -->
          <rect x="-42" y="-40" width="84" height="70" fill="#fde68a" stroke="#78350f" stroke-width="1.5"/>
          <!-- Horizontal siding lines -->
          <line x1="-42" y1="-22" x2="42" y2="-22" stroke="#a16207" stroke-width="0.6" opacity="0.6"/>
          <line x1="-42" y1="-4"  x2="42" y2="-4"  stroke="#a16207" stroke-width="0.6" opacity="0.6"/>
          <line x1="-42" y1="14"  x2="42" y2="14"  stroke="#a16207" stroke-width="0.6" opacity="0.6"/>
          <!-- Door -->
          <rect x="-10" y="0" width="20" height="30" fill="#7c2d12"/>
          <circle cx="7" cy="15" r="1.2" fill="#fde047"/>
          <!-- Windows -->
          <rect x="-36" y="-15" width="16" height="16" fill="#bae6fd" stroke="#78350f" stroke-width="1"/>
          <line x1="-28" y1="-15" x2="-28" y2="1" stroke="#78350f" stroke-width="0.8"/>
          <line x1="-36" y1="-7" x2="-20" y2="-7" stroke="#78350f" stroke-width="0.8"/>
          <rect x="20" y="-15" width="16" height="16" fill="#bae6fd" stroke="#78350f" stroke-width="1"/>
          <line x1="28" y1="-15" x2="28" y2="1" stroke="#78350f" stroke-width="0.8"/>
          <line x1="20" y1="-7" x2="36" y2="-7" stroke="#78350f" stroke-width="0.8"/>
          <!-- Roof (sloped) -->
          <polygon points="-50,-40 50,-40 38,-62 -38,-62" fill="#991b1b" stroke="#450a0a" stroke-width="1.5"/>
          <polygon points="-50,-40 50,-40 48,-36 -48,-36" fill="#7f1d1d"/>
          <!-- Chimney -->
          <rect x="20" y="-68" width="8" height="14" fill="#78716c"/>
          <!-- Clock -->
          <circle cx="0" cy="-48" r="7" fill="#f8fafc" stroke="#78350f" stroke-width="1"/>
          <line x1="0" y1="-48" x2="0"    y2="-53" stroke="#1c1917" stroke-width="1.2"/>
          <line x1="0" y1="-48" x2="3.5"  y2="-46" stroke="#1c1917" stroke-width="1"/>
          <!-- Station sign -->
          <rect x="-32" y="-82" width="64" height="14" fill="#1e3a8a" stroke="#fde047" stroke-width="1"/>
          <text x="0" y="-72" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-weight="700" fill="#fde047">STATION</text>
          <!-- Lamppost -->
          <rect x="55" y="-10" width="2" height="40" fill="#1c1917"/>
          <circle cx="56" cy="-14" r="5" fill="#fde047" opacity="0.9"/>
          <circle cx="56" cy="-14" r="3" fill="#fef3c7"/>
        </g>`;

      // ---------- Railroad crossing sign (75% milestone) ----------
      let crossingHTML = '';
      if (showCrossing) {
        const blink = Math.floor(t * 4) % 2 === 0;
        crossingHTML = `
          <g transform="translate(520,225)">
            <rect x="-1.5" y="0" width="3" height="80" fill="#1c1917"/>
            <!-- Crossbuck -->
            <g transform="rotate(45)">
              <rect x="-30" y="-4" width="60" height="8" fill="white" stroke="#991b1b" stroke-width="2"/>
              <text x="-20" y="3" font-family="Arial,sans-serif" font-size="7" font-weight="900" fill="#991b1b">R</text>
              <text x="14" y="3" font-family="Arial,sans-serif" font-size="7" font-weight="900" fill="#991b1b">R</text>
            </g>
            <g transform="rotate(-45)">
              <rect x="-30" y="-4" width="60" height="8" fill="white" stroke="#991b1b" stroke-width="2"/>
              <text x="-20" y="3" font-family="Arial,sans-serif" font-size="7" font-weight="900" fill="#991b1b">X</text>
              <text x="14" y="3" font-family="Arial,sans-serif" font-size="7" font-weight="900" fill="#991b1b">I</text>
            </g>
            <!-- Flashing lights -->
            <circle cx="-12" cy="-12" r="4" fill="${blink ? '#ef4444' : '#450a0a'}"/>
            <circle cx="12"  cy="-12" r="4" fill="${blink ? '#450a0a' : '#ef4444'}"/>
          </g>`;
      }

      // ---------- The locomotive ----------
      // Built as a group at origin, then translated to trainX.
      // Train faces right; origin is at rear-bottom of the chassis.
      const locomotive = `
        <g transform="translate(${trainX.toFixed(1)},320)">
          <!-- Soft ground shadow under the train -->
          <ellipse cx="60" cy="38" rx="85" ry="5" fill="#000" opacity="0.25"/>

          <!-- Cowcatcher (front, angled) -->
          <path d="M 115,5 L 135,-5 L 138,0 L 138,18 L 108,18 Z" fill="#b91c1c" stroke="#450a0a" stroke-width="1.5"/>
          <line x1="115" y1="8" x2="135" y2="-2" stroke="#fbbf24" stroke-width="1.2"/>
          <line x1="112" y1="13" x2="135" y2="3" stroke="#fbbf24" stroke-width="1"/>

          <!-- Chassis / underframe -->
          <rect x="-2" y="-5" width="120" height="10" fill="#1c1917"/>

          <!-- Boiler (main cylinder, seen from the side) -->
          <rect x="35" y="-38" width="78" height="38" rx="2" fill="#1e293b"/>
          <!-- Boiler bands -->
          <rect x="48" y="-38" width="2" height="38" fill="#fbbf24"/>
          <rect x="75" y="-38" width="2" height="38" fill="#fbbf24"/>
          <rect x="95" y="-38" width="2" height="38" fill="#fbbf24"/>
          <!-- Boiler front face (rounded headlamp plate) -->
          <circle cx="113" cy="-19" r="19" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
          <circle cx="113" cy="-19" r="15" fill="#1e293b"/>
          <!-- Headlamp -->
          <circle cx="120" cy="-25" r="5" fill="#fbbf24"/>
          <circle cx="121" cy="-26" r="3" fill="#fef08a"/>
          <!-- Headlamp glow (subtle cone) -->
          <polygon points="120,-25 170,-40 170,-10" fill="#fef08a" opacity="0.15"/>

          <!-- Cabin (back of train) -->
          <rect x="-5" y="-50" width="45" height="50" fill="#1e3a8a" stroke="#0c1e5e" stroke-width="1.5"/>
          <!-- Cabin roof overhang -->
          <rect x="-9" y="-55" width="53" height="6" fill="#172554"/>
          <rect x="-9" y="-55" width="53" height="2" fill="#fbbf24"/>
          <!-- Cabin window -->
          <rect x="2" y="-44" width="16" height="16" fill="#bae6fd" stroke="#fbbf24" stroke-width="1"/>
          <line x1="10" y1="-44" x2="10" y2="-28" stroke="#fbbf24" stroke-width="0.8"/>
          <!-- Cabin door outline -->
          <rect x="22" y="-40" width="15" height="34" fill="none" stroke="#fbbf24" stroke-width="0.8"/>

          <!-- Smokestack -->
          <rect x="55" y="-70" width="12" height="32" fill="#0f172a"/>
          <!-- Smokestack flare (top rim) -->
          <path d="M 52,-70 L 70,-70 L 68,-75 L 54,-75 Z" fill="#1c1917"/>

          <!-- Steam dome -->
          <rect x="80" y="-46" width="14" height="8" fill="#1e293b"/>
          <ellipse cx="87" cy="-48" rx="9" ry="5" fill="#334155"/>
          <ellipse cx="87" cy="-49" rx="5" ry="2" fill="#fbbf24"/>

          <!-- Safety valve / whistle -->
          <rect x="98" y="-44" width="4" height="6" fill="#fbbf24"/>
          <circle cx="100" cy="-46" r="3" fill="#92400e"/>

          <!-- Side running board -->
          <rect x="-2" y="0" width="120" height="3" fill="#78350f"/>

          <!-- Wheels (render last so spokes draw on top of chassis) -->
          ${wheel(15, 15, 8, wheelAngle * (8 / bigR))}
          ${wheel(60, 18, bigR, wheelAngle)}
          ${wheel(100, 15, 8, wheelAngle * (8 / bigR))}

          <!-- Side rod connecting all three wheels (oscillates up/down with wheel rotation) -->
          <line x1="15" y1="${(15 + sideRodDy).toFixed(1)}"
                x2="100" y2="${(15 + sideRodDy).toFixed(1)}"
                stroke="#78716c" stroke-width="3.5" stroke-linecap="round"/>
          <circle cx="15"  cy="${(15 + sideRodDy).toFixed(1)}" r="2.5" fill="#fbbf24"/>
          <circle cx="60"  cy="${(18 + sideRodDy).toFixed(1)}" r="3"   fill="#fbbf24"/>
          <circle cx="100" cy="${(15 + sideRodDy).toFixed(1)}" r="2.5" fill="#fbbf24"/>
        </g>`;

      return `
        <div class="visual-timer-container" style="padding:0.5rem 0 0.5rem">
          <div class="visual-timer-header"><h2 class="visual-timer-title">${title}</h2></div>
          <div class="train-scene">
            <svg class="train-svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMax meet" style="overflow:visible" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="trainSkyGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#60a5fa"/>
                  <stop offset="60%" stop-color="#bfdbfe"/>
                  <stop offset="100%" stop-color="#fef3c7"/>
                </linearGradient>
                <radialGradient id="trainSunGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"  stop-color="#fef9c3"/>
                  <stop offset="60%" stop-color="#fde047"/>
                  <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
                </radialGradient>
                <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#84cc16"/>
                  <stop offset="100%" stop-color="#4d7c0f"/>
                </linearGradient>
                <linearGradient id="ballastGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stop-color="#78716c"/>
                  <stop offset="100%" stop-color="#44403c"/>
                </linearGradient>
              </defs>

              <!-- Sky & grass are provided by CSS gradient on the scene container
                   so they extend to full container width/height regardless of SVG aspect. -->

              <!-- Sun with soft halo -->
              <circle cx="100" cy="80" r="50" fill="url(#trainSunGrad)"/>
              <circle cx="100" cy="80" r="28" fill="#fde047"/>
              <circle cx="100" cy="80" r="18" fill="#fef08a" opacity="0.85"/>

              <!-- Drifting clouds -->
              ${skyCloud(50,  70,  1.0)}
              ${skyCloud(320, 100, 0.85)}
              ${skyCloud(580, 55,  0.7)}
              ${skyCloud(760, 115, 0.9)}

              <!-- Distant mountain silhouette (extended past viewBox on both sides) -->
              <path d="M -300,290 L -120,200 L 0,240 L 120,180 L 200,230 L 320,160 L 440,220 L 560,170 L 680,210 L 800,200 L 950,240 L 1100,180 L 1100,400 L -300,400 Z"
                    fill="#7c3aed" opacity="0.25"/>

              <!-- Middle hills -->
              <path d="M -300,310 Q -100,270 100,295 Q 300,315 500,285 Q 700,305 900,280 Q 1000,290 1100,300 L 1100,420 L -300,420 Z"
                    fill="#65a30d" opacity="0.7"/>
              <path d="M -300,330 Q -50,300 200,325 Q 450,335 700,310 Q 900,320 1100,325 L 1100,450 L -300,450 Z"
                    fill="#4d7c0f" opacity="0.85"/>

              <!-- Distant trees -->
              ${distantTree(180, 310, 1.0, '#166534')}
              ${distantTree(220, 315, 0.8, '#15803d')}
              ${distantTree(420, 320, 0.9, '#166534')}
              ${distantTree(460, 325, 0.7, '#15803d')}

              <!-- Grass foreground provided by CSS container gradient -->

              <!-- Track ballast (gravel strip under ties) — extended past viewBox -->
              <rect x="-300" y="348" width="1400" height="22" fill="url(#ballastGrad)"/>

              <!-- Ties (crossties) — extended past viewBox on both sides -->
              ${(() => {
                let ties = '';
                for (let i = 0; i < 50; i++) {
                  const tx = -310 + i * 28;
                  ties += `<rect x="${tx}" y="350" width="16" height="18" fill="#57534e" stroke="#292524" stroke-width="0.5"/>`;
                }
                return ties;
              })()}

              <!-- Twin rails -->
              <rect x="-300" y="345" width="1400" height="3" fill="#a8a29e"/>
              <rect x="-300" y="366" width="1400" height="3" fill="#a8a29e"/>
              <!-- Rail highlights -->
              <rect x="-300" y="345" width="1400" height="1" fill="#e7e5e4"/>
              <rect x="-300" y="366" width="1400" height="1" fill="#e7e5e4"/>

              <!-- Station (fixed on the right) -->
              ${stationGroup}

              <!-- Telegraph pole -->
              <g transform="translate(280,280)">
                <rect x="-1.5" y="0" width="3" height="78" fill="#78350f"/>
                <rect x="-12" y="4" width="24" height="2.5" fill="#78350f"/>
                <rect x="-12" y="12" width="24" height="2.5" fill="#78350f"/>
                <circle cx="-10" cy="3" r="1.2" fill="#a8a29e"/>
                <circle cx="10" cy="3" r="1.2" fill="#a8a29e"/>
                <circle cx="-10" cy="11" r="1.2" fill="#a8a29e"/>
                <circle cx="10" cy="11" r="1.2" fill="#a8a29e"/>
                <!-- Wires -->
                <path d="M -10,3 Q 140,15 290,3" fill="none" stroke="#44403c" stroke-width="0.7"/>
                <path d="M 10,3 Q 160,18 310,3" fill="none" stroke="#44403c" stroke-width="0.7"/>
              </g>

              <!-- Railroad crossing sign (75% milestone) -->
              ${crossingHTML}

              <!-- Smoke puffs (drawn before train so train covers stack) -->
              ${smokeHTML}

              <!-- The locomotive -->
              ${locomotive}

              <!-- Arrival "TOOT!" burst at 100% -->
              ${arrived ? `
                <g transform="translate(${(trainX + 150).toFixed(1)},240)">
                  <path d="M 0,0 L -20,-10 L -18,0 L -20,10 Z" fill="white"/>
                  <ellipse cx="18" cy="0" rx="22" ry="14" fill="white" stroke="#1e293b" stroke-width="1.5"/>
                  <text x="18" y="4" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="900" fill="#dc2626">TOOT!</text>
                </g>
              ` : ''}
            </svg>
          </div>
          <div class="visual-countdown-overlay" id="visualCountdown">${countdown}</div>
        </div>`;
    }

    // Drag handler for the visual mode sidebar needle
    function startVisualDrag(e) {
      e.preventDefault();
      state.isDragging = true;
      // Disable the CSS top-transition while dragging so the needle tracks the cursor
      // instead of smoothly chasing it. Mirrors what the render template does on full re-render.
      document.getElementById('vsNeedle')?.classList.add('dragging');
      // Override global pointer handlers for sidebar drag
      window.onpointermove = visualDragMove;
      window.onpointerup = visualDragEnd;
    }

    function visualDragMove(e) {
      if (!state.isDragging) return;
      e.preventDefault();
      const container = document.getElementById('vsSidebarBlocks');
      if (!container) return;

      const blocks = getBlocks();
      // Use the actual DOM block layout (offsetTop/offsetHeight) so the cursor maps to
      // the visually-correct block. Time-fraction-of-parent doesn't work because
      // `min-height: 100%` leaves children to fall back to content-size, breaking
      // proportional layout — the slider would drift away from the cursor.
      const containerRect = container.getBoundingClientRect();
      const relY = e.clientY - containerRect.top;
      const blockEls = container.querySelectorAll('.vs-block');
      let foundIndex = -1;
      let progressInBlock = 0;
      if (relY <= 0) {
        foundIndex = 0;
        progressInBlock = 0;
      } else {
        for (let i = 0; i < blockEls.length; i++) {
          const top = blockEls[i].offsetTop;
          const height = blockEls[i].offsetHeight;
          if (relY < top + height) {
            foundIndex = i;
            progressInBlock = Math.max(0, Math.min(1, (relY - top) / height));
            break;
          }
        }
      }
      if (foundIndex === -1) {
        foundIndex = blocks.length - 1;
        progressInBlock = 1;
      }

      state.currentBlockIndex = foundIndex;
      state.secondsElapsedInBlock = progressInBlock * blocks[foundIndex].durationMinutes * 60;

      // Keep sidebar block highlighting in sync as the cursor crosses block boundaries.
      blockEls.forEach((el, i) => {
        el.classList.toggle('vs-active', i === state.currentBlockIndex);
        el.classList.toggle('vs-past', i < state.currentBlockIndex);
      });

      // Position the needle based on the same DOM offsets we just used to pick the block.
      positionVsNeedle();

      // Update animation area
      const mainArea = document.querySelector('.visual-main');
      const block = blocks[state.currentBlockIndex];
      if (mainArea && block) {
        mainArea.innerHTML = renderAnimationContent(block, getEffectiveSettings().viewMode);
      }
      // Apply warning color (no pulse — we silently reseed on drop)
      const remaining = block ? block.durationMinutes * 60 - state.secondsElapsedInBlock : 0;
      applyCountdownWarning(remaining);
      updateTimerHeader();
    }

    // Position the visual-mode sidebar needle to match the current state, using the
    // actual DOM offsets of block elements so it stays aligned with the visual layout
    // even when block heights aren't proportional to durations.
    function positionVsNeedle() {
      const container = document.getElementById('vsSidebarBlocks');
      const needle = document.getElementById('vsNeedle');
      if (!container || !needle) return;
      const blocks = getBlocks();
      if (!blocks.length) return;
      if (state.currentBlockIndex >= blocks.length) {
        needle.style.top = `${container.scrollHeight}px`;
        return;
      }
      const blockEls = container.querySelectorAll('.vs-block');
      const blockEl = blockEls[state.currentBlockIndex];
      if (!blockEl) return;
      const block = blocks[state.currentBlockIndex];
      const progressInBlock = Math.max(0, Math.min(1, state.secondsElapsedInBlock / (block.durationMinutes * 60)));
      needle.style.top = `${blockEl.offsetTop + blockEl.offsetHeight * progressInBlock}px`;
    }

    function visualDragEnd() {
      if (state.isDragging) {
        state.isDragging = false;
        reseedWarningsAfterScrub();
        anchorClockToCurrentPosition();
        if (state.isPlaying) startTimerTick();
        renderTimerFull();
        // Restore normal drag handlers
        setupDragHandlers();
      }
    }

    // ===== TIMER DISPLAY UPDATE (tick-level, no full re-render) =====
    function updateTimerDisplay() {
      const blocks = getBlocks();
      const block = blocks[state.currentBlockIndex];
      if (!block) return;

      const progress = Math.min(100, (state.secondsElapsedInBlock / (block.durationMinutes * 60)) * 100);
      const remaining = (block.durationMinutes * 60) - state.secondsElapsedInBlock;
      const countdown = formatTime(remaining);
      const s = getEffectiveSettings();

      // Detect & fire transition warnings (one-shot per threshold per block)
      maybeFireTransitionWarnings(remaining);

      // Update visual mode if active
      if (s.viewMode && s.viewMode !== 'schedule') {
        // Position the sidebar needle from actual DOM offsets so it stays aligned
        // with the visible blocks regardless of how their heights resolve.
        positionVsNeedle();

        // Re-render just the animation area (not the sidebar) for smooth visuals.
        // The animation render path injects countdown text + warning colors itself.
        const mainArea = document.querySelector('.visual-main');
        if (mainArea && state.currentBlockIndex < blocks.length) {
          mainArea.innerHTML = renderAnimationContent(block, s.viewMode);
        }

        // Apply warning color/pulse to the (newly rendered) countdown overlay
        applyCountdownWarning(remaining);

        updateTimerHeader();
        return;
      }

      // Update progress indicator
      if (s.progressStyle === 'line') {
        const needle = document.getElementById('lineNeedle');
        if (needle) needle.style.top = `${progress}%`;
      } else {
        const fill = document.getElementById('fillProgress');
        if (fill) fill.style.height = `${progress}%`;
      }

      // Update countdown badge text + warning color
      const badge = document.getElementById('countdownBadge');
      if (badge) {
        const span = badge.querySelector('span');
        if (span) span.textContent = countdown;
        const color = getCountdownColor(remaining);
        badge.style.color = color || '';
      }

      // Update header clock
      updateTimerHeader();
    }

    // Apply warning color, background, and pulse class to the visual-mode countdown
    // overlay (and any in-animation LCD display). Called every tick so the color
    // smoothly transitions across thresholds.
    function applyCountdownWarning(remaining) {
      const color = getCountdownColor(remaining);
      const bg = getCountdownBg(remaining);

      const overlay = document.getElementById('visualCountdown');
      if (overlay) {
        overlay.style.color = color || '';
        overlay.style.background = bg || '';
        // Final-10s gentle continuous pulse
        if (remaining > 0 && remaining <= 10) {
          if (!overlay.classList.contains('pulse-final')) overlay.classList.add('pulse-final');
        } else {
          overlay.classList.remove('pulse-final');
        }
      }
      // LCD display (balloon) gets the same final-10s pulse treatment; color stays
      // green to preserve the LCD aesthetic — the pulse alone signals urgency.
      const lcd = document.querySelector('.lcd-display');
      if (lcd) {
        if (remaining > 0 && remaining <= 10) {
          if (!lcd.classList.contains('pulse-final')) lcd.classList.add('pulse-final');
        } else {
          lcd.classList.remove('pulse-final');
        }
      }
    }

    // Fire one-shot warnings (visual pulse + optional audio chime) when remaining
    // crosses a threshold. Each threshold fires once per block.
    function maybeFireTransitionWarnings(remaining) {
      for (const t of WARNING_THRESHOLDS) {
        if (remaining <= t && !state.warningsFiredForBlock.has(t)) {
          state.warningsFiredForBlock.add(t);
          fireWarningPulse();
          if (state.settings.audioEnabled) playWarningChime(t);
          // Haptics fire independently of audio — light for 120/60/30s, medium for 10s
          nativeHaptic(t === 10 ? 'medium' : 'light');
        }
      }
    }

    // After a drag/scrub, mark every threshold that's already passed as "fired"
    // so the user doesn't get a chime cascade by jumping to the end of a block.
    // Called whenever the user moves the playhead manually.
    function reseedWarningsAfterScrub() {
      state.warningsFiredForBlock.clear();
      const blocks = getBlocks();
      const block = blocks[state.currentBlockIndex];
      if (!block) return;
      const remaining = block.durationMinutes * 60 - state.secondsElapsedInBlock;
      for (const t of WARNING_THRESHOLDS) {
        if (remaining <= t) state.warningsFiredForBlock.add(t);
      }
    }

    function fireWarningPulse() {
      // Add the one-shot pulse class to whichever countdown element is visible.
      const targets = [
        document.getElementById('visualCountdown'),
        document.getElementById('countdownBadge'),
        document.querySelector('.lcd-display'),
      ].filter(Boolean);
      for (const el of targets) {
        el.classList.remove('pulse-once');
        // Force reflow so re-adding the class restarts the animation
        // eslint-disable-next-line no-unused-expressions
        void el.offsetWidth;
        el.classList.add('pulse-once');
      }
    }

    function updateTimerHeader() {
      const blocks = getBlocks();
      const isComplete = state.currentBlockIndex >= blocks.length;
      let timeRemaining = '0:00';
      if (!isComplete) {
        if (Date.now() < state.runStartTime) {
          timeRemaining = `Starts in ${formatTime(Math.ceil((state.runStartTime - Date.now()) / 1000))}`;
        } else {
          const future = blocks.slice(state.currentBlockIndex + 1).reduce((a, b) => a + b.durationMinutes * 60, 0);
          const cur = Math.max(0, blocks[state.currentBlockIndex].durationMinutes * 60 - state.secondsElapsedInBlock);
          timeRemaining = formatTime(future + cur);
        }
      }
      const clock = document.querySelector('.timer-clock span');
      if (clock) clock.textContent = timeRemaining;
    }

    // ===== TIMER CONTROLS =====
    function togglePlay() {
      if (state.isPlaying) {
        // Pausing — record when pause started
        state.isPlaying = false;
        state.lastPauseStart = Date.now();
        stopTimer();
      } else {
        // Resuming — accumulate paused duration into offset
        ensureAudioContextRunning();
        if (state.lastPauseStart) {
          state.pauseOffset = (state.pauseOffset || 0) + (Date.now() - state.lastPauseStart) / 1000;
          state.lastPauseStart = 0;
        }
        state.isPlaying = true;
        startTimerTick();
      }
      renderTimerFull();
    }

    function resetTimer() {
      stopTimer();
      state.isPlaying = false;
      state.currentBlockIndex = 0;
      state.secondsElapsedInBlock = 0;
      // Reset clock anchor to now
      state.runStartTime = Date.now();
      state.pauseOffset = 0;
      state.lastPauseStart = 0;
      renderTimerFull();
    }

    function backToEdit() {
      stopTimer();
      state.mode = 'EDIT';
      state.showSettings = false;
      state.openStylePicker = null;
      state.sessionSettings = {};
      setNativeStatusBar(true);
      setNativeKeepAwake(false);
      render();
    }

    function toggleFullScreen() {
      const el = document.getElementById('timerContainer');
      if (!document.fullscreenElement) {
        el?.requestFullscreen().then(() => { state.isFullScreen = true; renderTimerFull(); }).catch(() => {});
      } else {
        document.exitFullscreen().then(() => { state.isFullScreen = false; renderTimerFull(); });
      }
    }

    // ===== DRAG SCRUBBING =====
    // After dragging, re-anchor the wall clock so that the new position
    // matches what Date.now() would produce on the next tick.
    function anchorClockToCurrentPosition() {
      const blocks = getBlocks();
      let totalSecondsToCurrentPos = 0;
      for (let i = 0; i < state.currentBlockIndex && i < blocks.length; i++) {
        totalSecondsToCurrentPos += blocks[i].durationMinutes * 60;
      }
      totalSecondsToCurrentPos += state.secondsElapsedInBlock;
      // Set runStartTime and clear offsets so that getTotalElapsedSeconds() == totalSecondsToCurrentPos
      const now = Date.now();
      state.runStartTime = now - (totalSecondsToCurrentPos * 1000);
      state.pauseOffset = 0;
      state.lastPauseStart = state.isPlaying ? 0 : now;
    }

    function startDrag(e) {
      e.preventDefault();
      state.isDragging = true;
      // Disable the CSS top-transition while dragging so the needle tracks the cursor
      // instead of smoothly chasing it. Mirrors what the render template does on full re-render.
      document.getElementById('lineNeedle')?.classList.add('dragging');
    }

    function setupDragHandlers() {
      // Reattach global pointer handlers
      window.onpointermove = (e) => {
        if (!state.isDragging) return;
        e.preventDefault();
        const container = document.getElementById('blocksContainer');
        if (!container) return;

        const blocks = getBlocks();
        // Walk the actual DOM block elements so the cursor maps to the visually-
        // correct block. min-block-height clamping breaks any time-fraction approach
        // because shorter blocks render larger than their proportional share.
        const containerRect = container.getBoundingClientRect();
        const relY = e.clientY - containerRect.top;
        const blockEls = container.querySelectorAll('.schedule-block');
        let foundIndex = -1;
        let progressInBlock = 0;
        if (relY <= 0) {
          foundIndex = 0;
          progressInBlock = 0;
        } else {
          for (let i = 0; i < blockEls.length; i++) {
            const top = blockEls[i].offsetTop;
            const height = blockEls[i].offsetHeight;
            if (relY < top + height) {
              foundIndex = i;
              progressInBlock = Math.max(0, Math.min(1, (relY - top) / height));
              break;
            }
          }
        }
        if (foundIndex === -1) {
          foundIndex = blocks.length - 1;
          progressInBlock = 1;
        }

        const blockChanged = foundIndex !== state.currentBlockIndex;
        state.currentBlockIndex = foundIndex;
        state.secondsElapsedInBlock = progressInBlock * blocks[foundIndex].durationMinutes * 60;

        if (blockChanged) {
          // The line-needle lives inside the active block, so a block change requires
          // a full re-render to move it to the new block. Within a block we just
          // nudge the needle's top, which is much cheaper.
          renderTimerFull();
        } else {
          updateTimerDisplay();
        }
      };

      window.onpointerup = () => {
        if (state.isDragging) {
          state.isDragging = false;
          reseedWarningsAfterScrub();
          // Re-anchor wall clock to match the dragged position
          anchorClockToCurrentPosition();
          if (state.isPlaying) startTimerTick();
          renderTimerFull();
        }
      };
    }

    // ===== SETTINGS =====
    function openSettings() { state.showSettings = true; renderTimerFull(); }
    function closeSettings() { state.showSettings = false; renderTimerFull(); }

    function renderSettingsModal() {
      const s = getEffectiveSettings();
      return `
        <div class="settings-overlay" onclick="closeSettings()">
          <div class="settings-panel" onclick="event.stopPropagation()">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
              <div style="display:flex;align-items:center;gap:0.5rem">
                ${iconHTML('settings', '" style="color:#818cf8')}
                <h2 style="font-size:1.125rem;font-weight:700">Settings</h2>
              </div>
              <button onclick="closeSettings()" style="color:#94a3b8;transition:color 0.15s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#94a3b8'">
                ${iconHTML('x')}
              </button>
            </div>

            <div style="max-height:80vh;overflow-y:auto;padding-right:0.5rem">
              <!-- Display Options -->
              <div>
                <h3 class="settings-section-title" style="margin-top:0">Display Options</h3>
                <label class="settings-checkbox-label">
                  <input type="checkbox" class="settings-checkbox" ${s.showGreeting ? 'checked' : ''} onchange="updateSetting('showGreeting', this.checked)">
                  <span>Show greeting message</span>
                </label>
                <label class="settings-checkbox-label">
                  <input type="checkbox" class="settings-checkbox" ${s.showTimeColumn ? 'checked' : ''} onchange="updateSetting('showTimeColumn', this.checked)">
                  <span>Show clock time column</span>
                </label>
                <label class="settings-checkbox-label" style="align-items:flex-start">
                  <input type="checkbox" class="settings-checkbox" style="margin-top:4px" ${s.audioEnabled ? 'checked' : ''} onchange="toggleAudio(this.checked)">
                  <span>
                    Transition chimes
                    <div style="font-size:0.85em;color:#94a3b8;margin-top:2px">Gentle bells at 2:00, 1:00, 0:30 and 0:10 marks</div>
                  </span>
                </label>
              </div>

              <!-- View Mode -->
              <div class="settings-section">
                <h3 class="settings-section-title">View Mode</h3>
                <select class="settings-select" onchange="updateSetting('viewMode', this.value)" value="${escHTML(s.viewMode || 'schedule')}">
                  <option value="schedule" ${s.viewMode === 'schedule' ? 'selected' : ''}>Schedule List</option>
                  <option value="flowers" ${s.viewMode === 'flowers' ? 'selected' : ''}>Growing Sunflower</option>
                  <option value="chickens" ${s.viewMode === 'chickens' ? 'selected' : ''}>Hatching Chickens</option>
                  <option value="gophers" ${s.viewMode === 'gophers' ? 'selected' : ''}>Pop-Up Gophers</option>
                  <option value="balloon" ${s.viewMode === 'balloon' ? 'selected' : ''}>Floating Balloon</option>
                  <option value="bomb" ${s.viewMode === 'bomb' ? 'selected' : ''}>Cartoon Bomb</option>
                  <option value="hourglass" ${s.viewMode === 'hourglass' ? 'selected' : ''}>Hourglass</option>
                  <option value="candle" ${s.viewMode === 'candle' ? 'selected' : ''}>Melting Candle</option>
                  <option value="rocket" ${s.viewMode === 'rocket' ? 'selected' : ''}>Rocket Launch</option>
                  <option value="water" ${s.viewMode === 'water' ? 'selected' : ''}>Filling Glass</option>
                  <option value="aquarium" ${s.viewMode === 'aquarium' ? 'selected' : ''}>Aquarium</option>
                  <option value="train" ${s.viewMode === 'train' ? 'selected' : ''}>Train to Station</option>
                </select>
              </div>

              <!-- Text Size -->
              <div class="settings-section">
                <h3 class="settings-section-title">Text Size</h3>
                <select class="settings-select" onchange="updateSetting('textSize', parseInt(this.value))">
                  <option value="1" ${s.textSize === 1 ? 'selected' : ''}>Small</option>
                  <option value="2" ${s.textSize === 2 ? 'selected' : ''}>Medium (Default)</option>
                  <option value="3" ${s.textSize === 3 ? 'selected' : ''}>Large</option>
                  <option value="4" ${s.textSize === 4 ? 'selected' : ''}>Extra Large</option>
                  <option value="5" ${s.textSize === 5 ? 'selected' : ''}>Huge</option>
                  <option value="6" ${s.textSize === 6 ? 'selected' : ''}>Giant</option>
                </select>
              </div>

              <!-- Progress Style -->
              <div class="settings-section">
                <h3 class="settings-section-title">Progress Style</h3>
                <label class="settings-radio-label">
                  <input type="radio" name="progressStyle" class="settings-radio" ${s.progressStyle === 'line' ? 'checked' : ''} onchange="updateSetting('progressStyle', 'line')">
                  <div>
                    <div class="settings-radio-text">Line</div>
                    <div class="settings-radio-desc">Red bar marks current position</div>
                  </div>
                </label>
                <label class="settings-radio-label">
                  <input type="radio" name="progressStyle" class="settings-radio" ${s.progressStyle === 'fill' ? 'checked' : ''} onchange="updateSetting('progressStyle', 'fill')">
                  <div>
                    <div class="settings-radio-text">Fill</div>
                    <div class="settings-radio-desc">Green shading shows completed time</div>
                  </div>
                </label>
              </div>

              <!-- Color Theme -->
              <div class="settings-section">
                <h3 class="settings-section-title">Color Theme</h3>
                ${['light','dark','high-contrast','warm','cool'].map(t => `
                  <button class="theme-btn ${s.theme === t ? 'active' : ''}" onclick="updateSetting('theme', '${t}')">
                    ${t.replace('-', ' ')}
                    ${s.theme === t ? iconHTML('check', 'icon-sm" style="color:#818cf8') : ''}
                  </button>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function updateSetting(key, value) {
      // The six visual fields are session-only when set from the gear during a run.
      // Audio is always global. Anything else falls through to global state.settings.
      if (SCHEDULE_SETTING_KEYS.includes(key)) {
        state.sessionSettings[key] = value;
        // Note: sessionSettings is intentionally NOT persisted to localStorage.
      } else {
        state.settings[key] = value;
        saveSettings();
      }
      renderTimerFull();
      if (state.isPlaying) startTimerTick();
    }

    function openStylePicker(which) {
      state.openStylePicker = which;
      render();
    }
    function closeStylePicker() {
      state.openStylePicker = null;
      render();
    }
    function updateScheduleSetting(key, value) {
      const sched = getCurrentSchedule();
      if (!sched.settings) sched.settings = snapshotGlobalScheduleSettings();
      sched.settings[key] = value;
      sched.lastModified = Date.now();
      saveSchedules();
      render();
    }

    // Audio toggle is special: enabling it should also unlock the AudioContext
    // (browsers require a user gesture) and play a brief sample so the teacher
    // confirms volume immediately.
    function toggleAudio(enabled) {
      state.settings.audioEnabled = enabled;
      saveSettings();
      if (enabled) {
        // Initialize / resume context inside the user-gesture handler
        const ctx = getAudioContext();
        if (ctx && ctx.state === 'suspended') { try { ctx.resume(); } catch(e){} }
        playChime(659, 250); // E5 sample
      }
    }

    // ===== EMBED MODE (homepage iframe) =====
    // Read ?embed=1 + optional ?mode=, ?theme=, ?textsize= and run the
    // schedule full-screen with no chrome, looping until the iframe goes away.
    // postMessage from the parent can swap mode/theme/textsize at runtime.
    function setupEmbedMode() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('embed') !== '1') return;

      state.embedMode = true;
      document.body.classList.add('embed-mode');

      // Apply settings from URL params (transient — never written to localStorage)
      const mode = params.get('mode');
      const theme = params.get('theme');
      const textSize = params.get('textsize');
      if (mode) state.sessionSettings.viewMode = mode;
      if (theme) state.sessionSettings.theme = theme;
      if (textSize) {
        const ts = parseInt(textSize, 10);
        if (ts >= 1 && ts <= 6) state.sessionSettings.textSize = ts;
      }

      // If no schedule was imported via ?s=, fall back to a short demo schedule
      // (1-min blocks) so the visual loops quickly enough to feel alive.
      const sharedSchedule = state.schedules.find(s => s.name === 'Imported Schedule');
      if (sharedSchedule) {
        state.schedules = [sharedSchedule];
        state.currentScheduleId = sharedSchedule.id;
      } else {
        state.schedules = [{
          id: 'embed-demo',
          name: 'Demo',
          blocks: [
            { id: 'd1', title: 'Warm up',   durationMinutes: 1 },
            { id: 'd2', title: 'Work time', durationMinutes: 1 },
            { id: 'd3', title: 'Wrap up',   durationMinutes: 1 },
          ],
          lastModified: 0,
        }];
        state.currentScheduleId = 'embed-demo';
      }

      // Force run mode + auto-play
      state.mode = 'RUN';
      state.runStartTime = Date.now();
      state.pauseOffset = 0;
      state.lastPauseStart = 0;
      state.currentBlockIndex = 0;
      state.secondsElapsedInBlock = 0;
      state.isPlaying = true;

      // Listen for runtime swap commands from the parent page
      window.addEventListener('message', (e) => {
        const msg = e.data;
        if (!msg || typeof msg !== 'object') return;
        let dirty = false;
        if (msg.type === 'setMode' && typeof msg.mode === 'string') {
          state.sessionSettings.viewMode = msg.mode;
          dirty = true;
        } else if (msg.type === 'setTheme' && typeof msg.theme === 'string') {
          state.sessionSettings.theme = msg.theme;
          dirty = true;
        } else if (msg.type === 'setTextSize' && msg.size != null) {
          const ts = parseInt(msg.size, 10);
          if (ts >= 1 && ts <= 6) { state.sessionSettings.textSize = ts; dirty = true; }
        }
        if (dirty) {
          renderTimerFull();
          if (state.isPlaying) startTimerTick();
        }
      });

      // Notify parent that the embed is ready (parent can queue setMode immediately)
      try { window.parent.postMessage({ type: 'embedReady' }, '*'); } catch (_) {}
    }

    // Release keep-awake when the app goes to the background; restore when it
    // returns to the foreground while a run is still active.
    document.addEventListener('visibilitychange', () => {
      const inRun = state.mode === 'RUN';
      if (document.hidden) {
        setNativeKeepAwake(false);
      } else if (inRun) {
        setNativeKeepAwake(true);
      }
    });

    // ===== INIT =====
    loadState();
    handleUrlImport();
    setupEmbedMode();
    render();
    if (state.embedMode && state.isPlaying) startTimerTick();

    // Focus rename input after render
    setTimeout(() => {
      if (state.isEditingName) {
        const el = document.getElementById('renameInput');
        if (el) el.focus();
      }
    }, 100);
  </script>
</body>
</html>
